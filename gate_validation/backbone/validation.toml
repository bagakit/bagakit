[[suite]]
id = "repo-legacy-cut"
owner = "gate_validation/backbone"
description = "Keep removed legacy control planes, legacy installer surfaces, and payload manifests out of the canonical repo."
default = true
proof_mode = "structural"
protects = ["removal of legacy submodule-hub control planes, compatibility installers, and payload manifests"]
oracle = ["fs runner rejects every registered forbidden path at the repository root"]
exercised_surface = ["repository root forbidden-path list declared in gate_validation/backbone/validation.toml"]
proves = ["repo-legacy-cut proves: Keep removed legacy control planes, legacy installer surfaces, and payload manifests out of the canonical repo."]
does_not_prove = ["repo-legacy-cut does not prove runtime behavior, semantic correctness, or eval quality."]
validation_class = "policy"
groups = ["repo", "backbone", "policy"]

[suite.runner]
kind = "fs"
forbidden_paths = [
  ".gitmodules",
  "projects",
  "scripts/add-project-skill-submodule.sh",
  "scripts/common.sh",
  "scripts/install-bagakit-skills.sh",
  "scripts/link-canonical-skill.sh",
  "scripts/package-all-skills.sh",
  "scripts/render_catalog.py",
  "scripts/render_catalog.sh",
  "scripts/release.sh",
