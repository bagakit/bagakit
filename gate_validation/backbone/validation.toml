version = 2

[[suite]]
id = "repo-structure"
owner = "gate_validation/backbone"
description = "Require the canonical repository layout for the validator-era monorepo."
default = true
proof_mode = "structural"
protects = ["canonical repository directory and file boundary for the Bagakit monorepo validation surface"]
oracle = ["fs runner checks the registered required_dirs and required_files against the repository root"]
exercised_surface = ["repository root layout entries declared in gate_validation/backbone/validation.toml"]
proves = ["repo-structure proves: Require the canonical repository layout for the validator-era monorepo."]
does_not_prove = ["repo-structure does not prove runtime behavior, semantic correctness, or eval quality."]
validation_class = "structure"
groups = ["repo", "backbone", "structure"]

