]

[[suite]]
id = "canonical-skill-layout"
owner = "gate_validation/backbone"
description = "Require install-ready directory-protocol skill discovery semantics and reject manifest-based payload control."
default = true
proof_mode = "runtime"
proves = ["canonical-skill-layout proves: Require install-ready directory-protocol skill discovery semantics and reject manifest-based payload control."]
does_not_prove = ["canonical-skill-layout does not prove live service behavior, stochastic agent quality, or unrelated repository surfaces."]
timeout_seconds = 120
validation_class = "tooling"
groups = ["repo", "backbone", "tooling"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/backbone/check-canonical-skill-layout.sh"
args = [
  "--root",
  "{repo_root}",
]

[[suite]]
id = "canonical-packaging-smoke"
owner = "gate_validation/backbone"
description = "Package discovered installable skills and verify the expected archives are emitted."
default = true
proof_mode = "runtime"
proves = ["canonical-packaging-smoke proves: Package discovered installable skills and verify the expected archives are emitted."]
does_not_prove = ["canonical-packaging-smoke does not prove live service behavior, stochastic agent quality, or unrelated repository surfaces."]
timeout_seconds = 300
validation_class = "smoke"
groups = ["repo", "backbone", "smoke"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/backbone/check-canonical-packaging.sh"
args = [
  "--root",
  "{repo_root}",
]

[[suite]]
id = "frontdoor-contract"
owner = "gate_validation/backbone"
description = "Validate the Bagakit frontdoor declaration/rendering contract through the repo-owned operator."
default = true
proof_mode = "runtime"
proves = ["frontdoor-contract proves: Validate the Bagakit frontdoor declaration/rendering contract through the repo-owned operator."]
does_not_prove = ["frontdoor-contract does not prove stochastic agent behavior or unrelated repository surfaces."]
timeout_seconds = 120
validation_class = "contract"
groups = ["repo", "backbone", "contract", "frontdoor"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/backbone/check-frontdoor-contract.sh"
args = [
  "--root",
  "{repo_root}",
]

[[suite]]
id = "runtime-surface-contract"
owner = "gate_validation/backbone"
description = "Require the runtime-surface contract to stay aligned across specs, skill docs, and current materialized .bagakit roots."
default = true
proof_mode = "wording_contract"
proves = ["runtime-surface-contract proves: Require the runtime-surface contract to stay aligned across specs, skill docs, and current materialized .bagakit roots."]
does_not_prove = ["runtime-surface-contract does not prove behavior outside its documented contract anchors."]
timeout_seconds = 120
validation_class = "contract"
groups = ["repo", "backbone", "contract", "runtime-surface"]

[suite.runner]
kind = "python_script"
script = "gate_validation/backbone/check-runtime-surface-contract.py"
args = [
  "--root",
  "{repo_root}",
]

[[suite]]
id = "runtime-control-chain-contract"
owner = "gate_validation/backbone"
description = "Require the runtime control chain docs and owner-local validation anchors to preserve host, protocol, runner, and receipt boundaries."
default = true
proof_mode = "wording_contract"
proves = ["runtime-control-chain-contract proves: the architecture and specs preserve protocol-kernel, mutation-receipt, host-exhaust, owner-local validation anchors, and the current protocol-kernel import boundary against host and runner modules."]
does_not_prove = ["runtime-control-chain-contract does not prove runtime behavior, full transitive import graph isolation, owner-local flow-runner or agent-loop smoke coverage, live runner behavior, or stochastic agent quality."]
timeout_seconds = 120
validation_class = "contract"
groups = ["repo", "backbone", "contract", "runtime-control-chain"]

[suite.runner]
kind = "python_script"
script = "gate_validation/backbone/check-runtime-control-chain.py"
args = [
  "--root",
  "{repo_root}",
]

[[suite]]
id = "validation-proof-discipline"
owner = "gate_validation/backbone"
description = "Keep validation proof-surface guidance aligned across AGENTS, spec, SOP, and validator docs."
default = true
proof_mode = "wording_contract"
proves = ["validation-proof-discipline proves: validation proof-surface guidance distinguishes public behavior and owned contract text from private implementation shape."]
does_not_prove = ["validation-proof-discipline does not prove runtime behavior, suite semantic correctness, or that every existing validation assertion follows the guidance."]
timeout_seconds = 120
validation_class = "contract"
groups = ["repo", "backbone", "contract", "validation"]

[suite.runner]
kind = "python_script"
script = "gate_validation/backbone/check-validation-proof-discipline.py"
args = [
  "--root",
  "{repo_root}",
]

[[suite]]
id = "skill-surface-tests"
owner = "gate_validation/backbone"
description = "Run the repo skill-surface regression tests."
default = true
proof_mode = "runtime"
proves = ["skill-surface-tests proves: Run the repo skill-surface regression tests."]
does_not_prove = ["skill-surface-tests does not prove live service behavior, stochastic agent quality, or unrelated repository surfaces."]
timeout_seconds = 180
validation_class = "quality"
groups = ["repo", "backbone", "quality", "skill-surface"]

[suite.runner]
kind = "executable"
command = "{node}"
args = [
  "--test",
  "--experimental-strip-types",
  "gate_validation/backbone/skill-surface.test.ts",
]
