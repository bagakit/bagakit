version = 2

[[suite]]
id = "bagakit-paperwork-technical-writing-contract"
owner = "skills/paperwork/bagakit-paperwork-technical-writing"
description = "Validate the technical-writing L2 boundary, core and de-AI-tone dispatch, review packet contract, source-parentage review template, and article checker behavior."
default = true
proof_mode = "runtime"
protects = ["bagakit-paperwork-technical-writing public CLI, L2 boundary documentation, core CLI dispatch, de-AI-tone primitive dispatch through core, standalone fallback boundary, review packet contract, and objective article hard gates"]
oracle = ["Python regression check runs skill CLI validation, verifies README layering tokens, dispatches the technical-writing CLI to bagakit-writing-core and through core to bagakit-writing-de-ai-tone, prints the review packet template, checks source-parentage report fields, and runs check-article.py on passing and failing synthetic fixtures"]
exercised_surface = ["technical-writing skill CLI", "technical-writing README layering surface", "core dispatch command", "de-AI-tone dispatch through core", "review packet template", "review report template", "check-article.py", "synthetic article fixtures"]
proves = ["bagakit-paperwork-technical-writing-contract proves the skill declares its L2 delivery-envelope boundary, exposes explicit core and de-AI-tone dispatch when composed, keeps standalone fallback wording visible, exposes review packet guidance, and accepts a structurally valid article while rejecting a placeholder draft under strict mode."]
does_not_prove = ["bagakit-paperwork-technical-writing-contract does not prove subjective publication quality, external source correctness, human voice, all possible article profiles, or behavior when the sibling core is intentionally absent from an installed host."]
timeout_seconds = 120
validation_class = "contract"
groups = ["skills", "paperwork", "bagakit-paperwork-technical-writing", "contract"]

[suite.runner]
kind = "python_script"
script = "gate_validation/skills/paperwork/bagakit-paperwork-technical-writing/check-paperwork-technical-writing.py"
args = []
