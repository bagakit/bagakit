version = 2

[[suite]]
id = "bagakit-writing-core-contract"
owner = "skills/paperwork/bagakit-writing-core"
description = "Validate the writing-core CLI, de-AI-tone dispatch, route checker, lint JSON output, review packet template, anti-rationalization table, and adaptive Intake/Core veto adapter contract when that surface is present."
default = true
proof_mode = "runtime"
protects = ["bagakit-writing-core public CLI, de-AI-tone L1 dispatch, generic route/foundation checker, lint output schema, review discipline surfaces, and Intake/Core veto adapter boundary when implemented"]
oracle = ["Python regression check runs the skill CLI, verifies de-AI-tone sibling dispatch, checks route and lint commands on synthetic artifacts, verifies review templates expose generic writing-core fields, adaptively checks Intake/Core veto documentation signals, and runs the Intake packet checker on valid JSON, valid YAML, broken evidence, and invalid enum/type synthetic packets."]
exercised_surface = ["writing-core skill CLI", "de-AI-tone dispatch", "writing_core_route_tools.py", "writing_core_lint.py", "writing_core_intake_packet.py", "review packet template", "anti-rationalization table", "optional Intake/Core adapter references or CLI", "synthetic markdown and JSON artifacts"]
proves = ["bagakit-writing-core-contract proves the core exposes route, lint, de-AI-tone, review-packet, and anti-rationalization surfaces without requiring qihan-writing or technical-writing; when Intake adapter files exist, it also proves Core exposes intake_packet/Core veto boundary signals, accepts JSON and YAML packets, rejects broken evidence references plus representative item enum/type/empty-evidence regressions, and maps semantic_drift to content_regression."]
does_not_prove = ["bagakit-writing-core-contract does not prove subjective writing quality, live source correctness, channel-specific style quality, all possible L2 integrations, or semantic quality of every possible Intake packet."]
timeout_seconds = 120
validation_class = "contract"
groups = ["skills", "paperwork", "bagakit-writing-core", "writing-core", "contract"]

[suite.runner]
kind = "python_script"
script = "gate_validation/skills/paperwork/bagakit-writing-core/check-writing-core.py"
args = [
  "--root",
  "{repo_root}",
]
