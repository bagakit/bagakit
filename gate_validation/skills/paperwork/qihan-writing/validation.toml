version = 2

[[suite]]
id = "qihan-writing-lint-prose-shape"
owner = "skills/paperwork/qihan-writing"
description = "Validate qihan_write_lint advisory findings for list-driven mechanical prose with synthetic fixture hygiene checks."
default = true
proof_mode = "runtime"
proves = ["qihan-writing-lint-prose-shape proves: qihan_write_lint emits non-blocking advisory prose-shape findings and the checked fixtures pass synthetic hygiene checks."]
does_not_prove = ["qihan-writing-lint-prose-shape does not prove subjective writing quality, external guidebook quality, copied-text absence, or all possible document surfaces."]
timeout_seconds = 120
validation_class = "smoke"
groups = ["skills", "paperwork", "qihan-writing", "lint", "smoke"]

[suite.runner]
kind = "python_script"
script = "gate_validation/skills/paperwork/qihan-writing/check-qihan-writing-lint.py"
args = [
  "--root",
  "{repo_root}",
]
