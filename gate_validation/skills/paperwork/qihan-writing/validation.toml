version = 2

[[suite]]
id = "qihan-writing-lint-prose-advisory"
owner = "skills/paperwork/qihan-writing"
description = "Validate qihan-writing L2 layering, core and de-AI-tone dispatch, fallback route-tool behavior, runtime reference hygiene, and lint advisory findings."
default = true
proof_mode = "runtime"
protects = ["qihan-writing L2 boundary documentation, core CLI dispatch, de-AI-tone primitive dispatch through core, standalone fallback route-tool error behavior, runtime reference path hygiene, lint advisory schema, prose-shape/mechanics finding codes, directory aggregation, fail-on behavior, and fixture hygiene"]
oracle = ["Python regression check verifies README/SKILL layering tokens, dispatches the qihan CLI to bagakit-writing-core and through core to bagakit-writing-de-ai-tone, rejects incomplete fallback handoffs with structured JSON and exit 2, scans runtime references for maintainer/project-local path leaks, runs qihan_write_lint.py on synthetic fixtures, and validates JSON metrics, advisory codes, exit behavior, and forbidden fixture tokens"]
exercised_surface = ["qihan-writing CLI", "core dispatch command", "de-AI-tone dispatch through core", "qihan_route_tools.py fallback derive-route", "qihan runtime references", "qihan_write_lint.py CLI", "synthetic markdown fixtures", "lint JSON output"]
proves = ["qihan-writing-lint-prose-advisory proves: qihan-writing declares its L2 relationship to bagakit-writing-core and bagakit-writing-de-ai-tone, can dispatch to the core CLI and the de-AI-tone primitive when composed, keeps fallback route errors structured for incomplete handoffs, avoids runtime reference dependencies on maintainer/project-local paths, emits non-blocking prose-shape and prose-mechanics advisory findings, and keeps checked fixtures synthetic and hygienic."]
does_not_prove = ["qihan-writing-lint-prose-advisory does not prove subjective writing quality, external guidebook quality, copied-text absence outside checked fixtures, semantic correctness, all possible document surfaces, or behavior when the sibling core is intentionally absent from an installed host."]
timeout_seconds = 120
validation_class = "smoke"
groups = ["skills", "paperwork", "qihan-writing", "lint", "smoke"]

[suite.runner]
kind = "python_script"
script = "gate_validation/skills/paperwork/qihan-writing/check-qihan-writing-lint.py"
args = [
  "--root",
  "{repo_root}",
]
