version = 2

[[suite]]
id = "qihan-writing-lint-prose-advisory"
owner = "skills/paperwork/qihan-writing"
description = "Validate qihan_write_lint advisory findings for list-driven and broader mechanical prose with synthetic fixture hygiene checks."
default = true
proof_mode = "runtime"
protects = ["qihan-writing lint command advisory schema, prose-shape/mechanics finding codes, directory aggregation, fail-on behavior, and fixture hygiene"]
oracle = ["Python regression check runs qihan_write_lint.py on synthetic fixtures and validates JSON metrics, advisory codes, exit behavior, and forbidden fixture tokens"]
exercised_surface = ["qihan_write_lint.py CLI", "synthetic markdown fixtures", "lint JSON output"]
proves = ["qihan-writing-lint-prose-advisory proves: qihan_write_lint emits non-blocking prose-shape and prose-mechanics advisory findings, and the checked fixtures pass synthetic hygiene checks."]
does_not_prove = ["qihan-writing-lint-prose-advisory does not prove subjective writing quality, external guidebook quality, copied-text absence, semantic correctness, or all possible document surfaces."]
timeout_seconds = 120
validation_class = "smoke"
groups = ["skills", "paperwork", "qihan-writing", "lint", "smoke"]

[suite.runner]
kind = "python_script"
script = "gate_validation/skills/paperwork/qihan-writing/check-qihan-writing-lint.py"
args = [
  "--root",
  "{repo_root}",
]
