[[suite]]
id = "bagakit-git-message-craft-smoke"
owner = "skills/swe/bagakit-git-message-craft"
description = "Run the canonical bagakit-git-message-craft lint, archive, and payload-boundary smoke checks."
default = true
proof_mode = "runtime"
protects = ["git-message-craft public CLI behavior for message linting, archive output, hook payload boundary, and path-leak rejection"]
oracle = ["smoke script executes the skill CLI against temporary repos and inspects generated messages, lint errors, archive files, and hook payloads"]
exercised_surface = ["skills/swe/bagakit-git-message-craft/scripts/bagakit-git-message-craft.sh", "generated commit/MR/archive artifacts", "lint-message command outputs"]
proves = ["bagakit-git-message-craft-smoke proves: Run the canonical bagakit-git-message-craft lint, archive, and payload-boundary smoke checks."]
does_not_prove = ["bagakit-git-message-craft-smoke does not prove live service behavior, stochastic agent quality, or unrelated repository surfaces."]
timeout_seconds = 300
validation_class = "smoke"
groups = ["skills", "swe", "git-message-craft", "smoke"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/skills/swe/bagakit-git-message-craft/check-bagakit-git-message-craft.sh"
args = [
  "--root",
  "{repo_root}",
]
