version = 2

[[suite]]
id = "bagakit-git-message-craft-layout"
owner = "skills/swe/bagakit-git-message-craft"
description = "Require the canonical runtime layout and keep maintainer-only payload out of bagakit-git-message-craft."
default = true
proof_mode = "structural"
protects = ["bagakit-git-message-craft installable runtime layout and exclusion of maintainer-only or legacy payload"]
oracle = ["fs runner checks required skill files, scripts, templates, references, eval registration, validation registration, and forbidden payload paths"]
exercised_surface = ["skills/swe/bagakit-git-message-craft runtime directory", "git-message-craft templates and references", "gate_validation/skills/swe/bagakit-git-message-craft registration"]
proves = ["bagakit-git-message-craft-layout proves: Require the canonical runtime layout and keep maintainer-only payload out of bagakit-git-message-craft."]
does_not_prove = ["bagakit-git-message-craft-layout does not prove runtime behavior, semantic correctness, or eval quality."]
validation_class = "structure"
groups = ["skills", "swe", "git-message-craft", "structure"]

