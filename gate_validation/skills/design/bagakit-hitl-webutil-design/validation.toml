[[suite]]
id = "bagakit-hitl-webutil-design-contract"
owner = "skills/design/bagakit-hitl-webutil-design"
description = "Require the structured HITL web utility design workflow contract."
default = true
proof_mode = "structural"
protects = ["HITL webutil design stage, artifact, eval, shared-guard, crosswalk, and peer-boundary contract"]
oracle = ["parsed workflow-contract.toml plus crosswalk and SKILL.md anchor checks"]
exercised_surface = ["skills/design/bagakit-hitl-webutil-design/references/workflow-contract.toml", "composition-crosswalk.md", "SKILL.md"]
proves = ["bagakit-hitl-webutil-design-contract proves required contract stages, artifacts, hardening gates, shared guards, and composition boundaries are aligned."]
does_not_prove = ["bagakit-hitl-webutil-design-contract does not prove final page usability, frontend implementation quality, or stochastic agent compliance."]
timeout_seconds = 120
validation_class = "contract"
groups = ["skills", "design", "hitl-webutil-design", "contract"]

[suite.runner]
kind = "python_script"
script = "gate_validation/skills/design/bagakit-hitl-webutil-design/check-hitl-webutil-design.py"
args = [
  "--root",
  "{repo_root}",
]
