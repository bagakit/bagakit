version = 2

[[suite]]
id = "bagakit-hitl-webutil-design-layout"
owner = "skills/design/bagakit-hitl-webutil-design"
description = "Require the canonical runtime layout for bagakit-hitl-webutil-design."
default = true
proof_mode = "structural"
protects = ["bagakit-hitl-webutil-design installable runtime layout, mechanism/style/artifact reference sets, CLI declaration, and validation registration"]
oracle = ["fs runner checks required HITL design skill files, reference directories, script, and gate registration"]
exercised_surface = ["skills/design/bagakit-hitl-webutil-design runtime directory", "HITL webutil design references", "gate_validation/skills/design/bagakit-hitl-webutil-design registration"]
proves = ["bagakit-hitl-webutil-design-layout proves required skill files and reference sets are present."]
does_not_prove = ["bagakit-hitl-webutil-design-layout does not prove live page usability, visual quality, or implementation behavior."]
validation_class = "structure"
groups = ["skills", "design", "hitl-webutil-design", "structure"]

