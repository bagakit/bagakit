version = 2

[[suite]]
id = "bagakit-daily-media-production-layout"
owner = "skills/media-production/bagakit-daily-media-production"
description = "Require the canonical runtime layout for bagakit-daily-media-production."
default = true
proof_mode = "structural"
protects = ["bagakit-daily-media-production installable runtime layout and orchestration reference set"]
oracle = ["fs runner checks required skill files, runbook references, frontdoor declaration, CLI declaration, and validation registration while rejecting non-runtime payload paths"]
exercised_surface = ["skills/media-production/bagakit-daily-media-production runtime directory", "daily-media-production references", "gate_validation/skills/media-production/bagakit-daily-media-production registration"]
proves = ["bagakit-daily-media-production-layout proves required skill files and references are present."]
does_not_prove = ["bagakit-daily-media-production-layout does not prove live social acquisition, image generation quality, webpage visual parity, deployment success, notification delivery, or scheduler reliability."]
validation_class = "structure"
groups = ["skills", "media-production", "daily-media-production", "structure"]

[suite.runner]
kind = "fs"
required_dirs = [
  "skills/media-production/bagakit-daily-media-production",
  "skills/media-production/bagakit-daily-media-production/references",
  "skills/media-production/bagakit-daily-media-production/scripts",
  "gate_validation/skills/media-production/bagakit-daily-media-production",
]
required_files = [
  "skills/media-production/bagakit-daily-media-production/README.md",
  "skills/media-production/bagakit-daily-media-production/SKILL.md",
  "skills/media-production/bagakit-daily-media-production/references/adapter-matrix.md",
  "skills/media-production/bagakit-daily-media-production/references/domain-packs.md",
  "skills/media-production/bagakit-daily-media-production/references/runbook.md",
  "skills/media-production/bagakit-daily-media-production/references/run-artifacts.md",
  "skills/media-production/bagakit-daily-media-production/references/frontdoor-rule.toml",
  "skills/media-production/bagakit-daily-media-production/references/skill-cli.toml",
  "skills/media-production/bagakit-daily-media-production/scripts/bagakit-daily-media-production-cli.sh",
  "gate_validation/skills/media-production/bagakit-daily-media-production/check-daily-media-production.sh",
  "gate_validation/skills/media-production/bagakit-daily-media-production/validation.toml",
  "gate_eval/skills/media-production/bagakit-daily-media-production/cases/agent-behavior-eval-dataset.json",
]
forbidden_paths = [
  "skills/media-production/bagakit-daily-media-production/SKILL_PAYLOAD.json",
  "skills/media-production/bagakit-daily-media-production/agents",
  "skills/media-production/bagakit-daily-media-production/docs",
  "skills/media-production/bagakit-daily-media-production/gate",
  "skills/media-production/bagakit-daily-media-production/scripts_dev",
]

[[suite]]
id = "bagakit-daily-media-production-smoke"
owner = "skills/media-production/bagakit-daily-media-production"
description = "Run deterministic CLI behavior, dependency-preflight, run-validation, no-publish, and ledger-contract smoke checks."
default = true
proof_mode = "runtime"
protects = ["bagakit-daily-media-production public CLI behavior, adapter preflight semantics, run validation semantics, no-publish status rules, and run ledger contract text"]
oracle = ["smoke script executes the skill CLI against deterministic routes, checks failure exit codes for missing values and blocked adapters, verifies env-name-only notification diagnostics, validates built-in domain-pack listing and initialization, validates draft, publishable, and leak-detected run fixtures, and inspects skill references for no-publish, status separation, domain-pack, and ledger template anchors"]
exercised_surface = ["skills/media-production/bagakit-daily-media-production/scripts/bagakit-daily-media-production-cli.sh", "skills/media-production/bagakit-daily-media-production/SKILL.md", "daily-media-production references"]
proves = ["bagakit-daily-media-production-smoke proves deterministic local behavior for CLI parsing, selected dependency-preflight branches, built-in starter domain-pack listing and run initialization, run-ledger validation outcomes, status separation, leak guards, and the presence of no-publish and run-ledger contract anchors."]
does_not_prove = ["bagakit-daily-media-production-smoke does not prove live social acquisition, image generation quality, webpage visual parity, Vercel deployment success, notification delivery, scheduler reliability, or stochastic agent editorial quality."]
timeout_seconds = 60
validation_class = "smoke"
groups = ["skills", "media-production", "daily-media-production", "smoke"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/skills/media-production/bagakit-daily-media-production/check-daily-media-production.sh"
args = [
  "--root",
  "{repo_root}",
]
