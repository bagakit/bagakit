version = 2

[[suite]]
id = "bagakit-skill-evolver-layout"
owner = "skills/harness/bagakit-skill-evolver"
description = "Require the canonical evolver runtime layout and keep legacy standalone repo control files out of the canonical skill."
default = true
proof_mode = "structural"
protects = ["bagakit-skill-evolver installable runtime layout, evolver contract docs, and exclusion of legacy standalone repo files"]
oracle = ["fs runner checks required skill sources, evolver specs, eval registration, validation scripts, and forbidden legacy paths"]
exercised_surface = ["skills/harness/bagakit-skill-evolver runtime directory", "docs/specs/evolver-* and selector-evolver docs", "gate_validation/skills/harness/bagakit-skill-evolver registration"]
proves = ["bagakit-skill-evolver-layout proves: Require the canonical evolver runtime layout and keep legacy standalone repo control files out of the canonical skill."]
does_not_prove = ["bagakit-skill-evolver-layout does not prove runtime behavior, semantic correctness, or eval quality."]
validation_class = "structure"
groups = ["skills", "harness", "evolver", "structure"]

[suite.runner]
kind = "fs"
required_dirs = [
  "skills/harness/bagakit-skill-evolver",
  "skills/harness/bagakit-skill-evolver/scripts",
  "gate_eval/skills/harness/bagakit-skill-evolver",
  "gate_eval/skills/harness/bagakit-skill-evolver/results",
  "gate_eval/skills/harness/bagakit-skill-evolver/results/runs",
  "gate_validation/skills/harness/bagakit-skill-evolver",
]
required_files = [
  "docs/specs/evolver-evidence-intake.md",
  "docs/specs/evolver-session-review.md",
  "docs/specs/evolver-memory.md",
  "docs/specs/selector-evolver-boundary.md",
  "docs/stewardship/evolver-done-criteria.md",
  "skills/harness/bagakit-skill-evolver/README.md",
  "skills/harness/bagakit-skill-evolver/SKILL.md",
  "skills/harness/bagakit-skill-evolver/scripts/evolver.ts",
  "skills/harness/bagakit-skill-evolver/scripts/lib/args.ts",
  "skills/harness/bagakit-skill-evolver/scripts/lib/fs.ts",
  "skills/harness/bagakit-skill-evolver/scripts/lib/model.ts",
  "skills/harness/bagakit-skill-evolver/scripts/lib/paths.ts",
  "skills/harness/bagakit-skill-evolver/scripts/lib/readiness.ts",
  "skills/harness/bagakit-skill-evolver/scripts/lib/render.ts",
  "skills/harness/bagakit-skill-evolver/scripts/lib/text.ts",
  "skills/harness/bagakit-skill-evolver/scripts/lib/validate.ts",
  "gate_eval/skills/harness/bagakit-skill-evolver/README.md",
  "gate_eval/skills/harness/bagakit-skill-evolver/suite.ts",
  "gate_eval/skills/harness/bagakit-skill-evolver/validation.toml",
  "gate_eval/skills/harness/bagakit-skill-evolver/results/.gitignore",
  "gate_eval/skills/harness/bagakit-skill-evolver/results/README.md",
  "gate_eval/skills/harness/bagakit-skill-evolver/results/runs/.gitkeep",
  "gate_validation/skills/harness/bagakit-skill-evolver/validation.toml",
  "gate_validation/skills/harness/bagakit-skill-evolver/check-evolver-state.sh",
  "gate_validation/skills/harness/bagakit-skill-evolver/check-evolver-smoke.sh",
]
forbidden_paths = [
  "skills/harness/bagakit-skill-evolver/SKILL_PAYLOAD.json",
  "skills/harness/bagakit-skill-evolver/AGENTS.md",
  "skills/harness/bagakit-skill-evolver/Makefile",
  "skills/harness/bagakit-skill-evolver/docs",
  "skills/harness/bagakit-skill-evolver/scripts_dev",
]

[[suite]]
id = "bagakit-skill-evolver-state"
owner = "skills/harness/bagakit-skill-evolver"
description = "Validate repository evolver state when present, or else validate the operator contract against an isolated bootstrap layout."
default = true
proof_mode = "state_machine"
protects = ["skill-evolver repository state validation and isolated bootstrap contract when no repo state exists"]
oracle = ["state script validates existing .bagakit/evolver state or creates an isolated bootstrap layout and checks operator outputs"]
exercised_surface = ["skill-evolver CLI", ".bagakit/evolver state files when present", "isolated bootstrap workspace fixture"]
proves = ["bagakit-skill-evolver-state proves: Validate repository evolver state when present, or else validate the operator contract against an isolated bootstrap layout."]
does_not_prove = ["bagakit-skill-evolver-state does not prove live service behavior, stochastic agent quality, or unrelated workflows."]
timeout_seconds = 300
validation_class = "tooling"
groups = ["skills", "harness", "evolver", "smoke"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/skills/harness/bagakit-skill-evolver/check-evolver-state.sh"
args = [
  "--root",
  "{repo_root}",
]

[[suite]]
id = "bagakit-skill-evolver-smoke"
owner = "skills/harness/bagakit-skill-evolver"
description = "Run a minimal evolver lifecycle covering reviewed session intake, routing, promotion readiness, handoff, and archive artifacts."
default = true
proof_mode = "runtime"
protects = ["skill-evolver public CLI lifecycle for reviewed session intake, signal capture/import/adoption, topic tracking, promotion proof refs, handoff, archive, and readiness state"]
oracle = ["smoke script drives evolver.ts commands in a temporary repo and checks accepted-only session bridging, preserved evidence metadata, JSON state, rejected missing proof refs, handoff/archive files, and readiness output"]
exercised_surface = ["evolver.ts CLI", ".mem_inbox signal state", ".bagakit/evolver topic state", "session review and signal contracts", "HANDOFF.md and ARCHIVE.md artifacts"]
proves = ["bagakit-skill-evolver-smoke proves accepted-only reviewed session intake plus the existing routing, promotion readiness, handoff, and archive lifecycle."]
does_not_prove = ["bagakit-skill-evolver-smoke does not prove live service behavior, stochastic agent quality, or unrelated repository surfaces."]
timeout_seconds = 300
validation_class = "smoke"
groups = ["skills", "harness", "evolver", "smoke"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/skills/harness/bagakit-skill-evolver/check-evolver-smoke.sh"
args = [
  "--root",
  "{repo_root}",
]
