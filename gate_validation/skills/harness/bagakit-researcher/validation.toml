version = 2

[[suite]]
id = "bagakit-researcher-layout"
owner = "skills/harness/bagakit-researcher"
description = "Require the canonical runtime layout and keep non-runtime repo artifacts out of bagakit-researcher."
default = true
proof_mode = "structural"
protects = ["bagakit-researcher installable runtime layout, research workspace contract files, and exclusion of non-runtime artifacts"]
oracle = ["fs runner checks required skill files, research references, scripts, eval registration, validation scripts, and forbidden non-runtime paths"]
exercised_surface = ["skills/harness/bagakit-researcher runtime directory", "researcher workspace/wiki contract references", "gate_validation/skills/harness/bagakit-researcher registration"]
proves = ["bagakit-researcher-layout proves: Require the canonical runtime layout and keep non-runtime repo artifacts out of bagakit-researcher."]
does_not_prove = ["bagakit-researcher-layout does not prove runtime behavior, semantic correctness, or eval quality."]
validation_class = "structure"
groups = ["skills", "harness", "researcher", "structure"]

[suite.runner]
kind = "fs"
required_dirs = [
  "skills/harness/bagakit-researcher",
  "skills/harness/bagakit-researcher/references",
  "skills/harness/bagakit-researcher/scripts",
  "gate_eval/skills/harness/bagakit-researcher",
  "gate_eval/skills/harness/bagakit-researcher/results",
  "gate_eval/skills/harness/bagakit-researcher/results/runs",
  "gate_validation/skills/harness/bagakit-researcher",
]
required_files = [
  "skills/harness/bagakit-researcher/README.md",
  "skills/harness/bagakit-researcher/SKILL.md",
  "skills/harness/bagakit-researcher/references/bagakit-driver.toml",
  "skills/harness/bagakit-researcher/references/research-workspace-spec.md",
  "skills/harness/bagakit-researcher/references/wiki-contract.toml",
  "skills/harness/bagakit-researcher/scripts/bagakit-researcher.sh",
  "skills/harness/bagakit-researcher/scripts/bagakit-researcher.py",
  "gate_eval/skills/harness/bagakit-researcher/README.md",
  "gate_eval/skills/harness/bagakit-researcher/suite.ts",
  "gate_eval/skills/harness/bagakit-researcher/validation.toml",
  "gate_eval/skills/harness/bagakit-researcher/results/.gitignore",
  "gate_eval/skills/harness/bagakit-researcher/results/README.md",
  "gate_eval/skills/harness/bagakit-researcher/results/runs/.gitkeep",
  "gate_validation/skills/harness/bagakit-researcher/validation.toml",
  "gate_validation/skills/harness/bagakit-researcher/check-bagakit-researcher.sh",
  "gate_validation/skills/harness/bagakit-researcher/check-researcher-wiki-contract.py",
]
forbidden_paths = [
  "skills/harness/bagakit-researcher/SKILL_PAYLOAD.json",
  "skills/harness/bagakit-researcher/agents",
  "skills/harness/bagakit-researcher/docs",
  "skills/harness/bagakit-researcher/gate",
  "skills/harness/bagakit-researcher/scripts_dev",
]

[[suite]]
id = "bagakit-researcher-smoke"
owner = "skills/harness/bagakit-researcher"
description = "Run a minimal researcher lifecycle: initialize a topic, plan a survey and pass, list it, and validate workspace shape."
default = true
proof_mode = "runtime"
protects = ["researcher public operator lifecycle for topic creation, survey packets, source cards, summaries, passes, tracks, claims, insights, leads, synthesis, wiki refresh, and leak hygiene"]
oracle = ["smoke script drives the researcher CLI in temporary workspaces and checks generated topic files, doctor warnings, wiki indexes, and absence of local path leaks"]
exercised_surface = ["bagakit-researcher.sh CLI", ".bagakit/researcher topic workspaces", "topic index/wiki files", "doctor output"]
proves = ["bagakit-researcher-smoke proves: Run a minimal researcher lifecycle across topic creation, survey packets, pass and track planning, source and summary capture, warning checks, wiki refresh, and handoff isolation."]
does_not_prove = ["bagakit-researcher-smoke does not prove live service behavior, stochastic agent quality, or unrelated repository surfaces."]
timeout_seconds = 300
validation_class = "smoke"
groups = ["skills", "harness", "researcher", "smoke"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/skills/harness/bagakit-researcher/check-bagakit-researcher.sh"
args = [
  "--root",
  "{repo_root}",
]

[[suite]]
id = "bagakit-researcher-wiki-contract"
owner = "skills/harness/bagakit-researcher"
description = "Require the structured researcher wiki frontdoor and maintenance-duty contract."
default = true
proof_mode = "structural"
protects = ["researcher wiki frontdoor boundary, topic-evidence source of truth, and read-before-maintain duty"]
oracle = ["parsed wiki-contract.toml checked against researcher skill docs, workspace spec, and generated wiki contract expectations"]
exercised_surface = ["skills/harness/bagakit-researcher/references/wiki-contract.toml", "researcher SKILL.md", "research workspace spec"]
proves = ["bagakit-researcher-wiki-contract proves: wiki frontdoor surfaces, maintenance duties, and topic-evidence boundaries are schema-valid and linked from the shipped skill."]
does_not_prove = ["bagakit-researcher-wiki-contract does not prove researcher runtime behavior, actual agent compliance, stochastic research quality, or unrelated repository surfaces."]
timeout_seconds = 120
validation_class = "contract"
groups = ["skills", "harness", "researcher", "wiki", "contract"]

[suite.runner]
kind = "python_script"
script = "gate_validation/skills/harness/bagakit-researcher/check-researcher-wiki-contract.py"
args = [
  "--root",
  "{repo_root}",
]
