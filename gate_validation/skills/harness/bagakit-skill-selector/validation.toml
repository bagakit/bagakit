[[suite]]
id = "bagakit-skill-selector-policy-alignment"
owner = "skills/harness/bagakit-skill-selector"
description = "Keep mandatory selector-preflight policy aligned through the structured policy contract."
default = true
proof_mode = "structural"
protects = ["selector preflight policy, candidate-state vocabulary, authority paths, and legacy wording exclusions"]
oracle = ["parsed policy-contract.toml plus alignment checks against selector specs, skill docs, and bootstrap references"]
exercised_surface = ["skills/harness/bagakit-skill-selector/references/policy-contract.toml", "selector specs", "selector SKILL.md"]
proves = ["bagakit-skill-selector-policy-alignment proves: structured selector policy rules, candidate states, authority paths, and forbidden legacy wording are aligned."]
does_not_prove = ["bagakit-skill-selector-policy-alignment does not prove selector CLI behavior, actual preflight execution, stochastic agent behavior, or unrelated repository surfaces."]
timeout_seconds = 120
validation_class = "contract"
groups = ["skills", "harness", "usage-loop", "policy", "contract"]

[suite.runner]
kind = "python_script"
script = "gate_validation/skills/harness/bagakit-skill-selector/check-selector-policy-alignment.py"
args = [
  "--root",
  "{repo_root}",
]

[[suite]]
id = "bagakit-skill-selector-planning-entry"
owner = "skills/harness/bagakit-skill-selector"
description = "Validate canonical planning-entry route semantics, including participant sets and rejection of generic root planning artifacts."
default = true
proof_mode = "runtime"
protects = ["selector planning-entry route semantics for participant sets and rejection of generic root planning artifacts"]
oracle = ["planning-entry script checks recipe contracts and generated selector task artifacts for the canonical planning-entry routes"]
exercised_surface = ["selector planning-entry recipe markdown", ".bagakit/skill-selector task artifacts", "gate_validation/skills/harness/bagakit-skill-selector/check-selector-planning-entry.sh"]
proves = ["bagakit-skill-selector-planning-entry proves: Validate canonical planning-entry route semantics, including participant sets and rejection of generic root planning artifacts."]
does_not_prove = ["bagakit-skill-selector-planning-entry does not prove live service behavior, stochastic agent quality, or unrelated repository surfaces."]
timeout_seconds = 120
validation_class = "quality"
groups = ["skills", "harness", "usage-loop", "planning-entry", "quality"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/skills/harness/bagakit-skill-selector/check-selector-planning-entry.sh"
args = [
  "--root",
  "{repo_root}",
]

[[suite]]
id = "bagakit-skill-selector-smoke"
owner = "skills/harness/bagakit-skill-selector"
description = "Run a minimal task-level skill-selector lifecycle with explicit composition and strict validation."
default = true
proof_mode = "runtime"
protects = ["selector public CLI lifecycle for preflight, recipe selection, project preferences, daily sidecar isolation, skill planning, ranking, and evolver handoff"]
oracle = ["smoke script runs selector CLI commands in a temporary repo and checks generated TOML, reports, git-ignore behavior, ranking output, and strict validation"]
exercised_surface = ["skill_selector.ts CLI", "selector task usage TOML records", "candidate survey and ranking reports", "selector daily sidecar files"]
proves = ["bagakit-skill-selector-smoke proves: Run a minimal task-level skill-selector lifecycle with explicit composition and strict validation."]
does_not_prove = ["bagakit-skill-selector-smoke does not prove live service behavior, stochastic agent quality, or unrelated repository surfaces."]
timeout_seconds = 120
validation_class = "smoke"
groups = ["skills", "harness", "usage-loop", "smoke"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/skills/harness/bagakit-skill-selector/check-skill-selector.sh"
args = [
  "--root",
  "{repo_root}",
]

[[suite]]
id = "bagakit-skill-selector-recipe-contract"
owner = "skills/harness/bagakit-skill-selector"
description = "Require selector recipes to carry the stable contract sections for fit, order, synthesis, and fallback."
default = true
proof_mode = "wording_contract"
protects = ["selector recipe contract sections that make multi-skill composition explicit and auditable"]
oracle = ["recipe contract script checks owned recipe markdown for stable fit, order, synthesis, fallback, and boundary sections"]
exercised_surface = ["skills/harness/bagakit-skill-selector/recipes/*.md"]
proves = ["bagakit-skill-selector-recipe-contract proves: Require selector recipes to carry the stable contract sections for fit, order, synthesis, and fallback."]
does_not_prove = ["bagakit-skill-selector-recipe-contract does not prove behavior outside its documented contract anchors."]
timeout_seconds = 120
validation_class = "contract"
groups = ["skills", "harness", "usage-loop", "contract"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/skills/harness/bagakit-skill-selector/check-selector-recipes.sh"
args = [
  "--root",
  "{repo_root}",
]
