  "skills/harness/bagakit-skill-selector/recipes/planning-entry-brainstorm-feature-flow.md",
  "skills/harness/bagakit-skill-selector/references/project-preferences-file-spec.md",
  "skills/harness/bagakit-skill-selector/references/bagakit-driver.toml",
  "skills/harness/bagakit-skill-selector/references/skill-usage-file-spec.md",
  "skills/harness/bagakit-skill-selector/references/policy-contract.toml",
  "skills/harness/bagakit-skill-selector/scripts/skill_selector.ts",
  "skills/harness/bagakit-skill-selector/scripts/lib/daily.ts",
  "skills/harness/bagakit-skill-selector/scripts/lib/candidate_survey.ts",
  "skills/harness/bagakit-skill-selector/scripts/lib/project_preferences.ts",
  "skills/harness/bagakit-skill-selector/scripts/lib/skill_catalog.ts",
  "skills/harness/bagakit-skill-selector/scripts/lib/reports.ts",
  "gate_eval/skills/harness/bagakit-skill-selector/README.md",
  "gate_eval/skills/harness/bagakit-skill-selector/suite.ts",
