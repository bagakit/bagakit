version = 2

[[suite]]
id = "bagakit-skill-selector-structure"
owner = "skills/harness/bagakit-skill-selector"
description = "Require selector runtime files, recipes, and references that define explicit task-level composition behavior."
default = true
proof_mode = "structural"
protects = ["bagakit-skill-selector runtime files, recipes, references, assets, scripts, and validation/eval registration for explicit task-level composition"]
oracle = ["fs runner checks required selector directories and files that define the installed skill, recipe set, policy references, and gate registration"]
exercised_surface = ["skills/harness/bagakit-skill-selector runtime directory", "selector recipes and references", "gate_validation/skills/harness/bagakit-skill-selector registration"]
proves = ["bagakit-skill-selector-structure proves: Require selector runtime files, recipes, and references that define explicit task-level composition behavior."]
does_not_prove = ["bagakit-skill-selector-structure does not prove runtime behavior, semantic correctness, or eval quality."]
validation_class = "structure"
groups = ["skills", "harness", "usage-loop", "structure"]

[suite.runner]
kind = "fs"
required_dirs = [
  "skills/harness/bagakit-skill-selector",
  "skills/harness/bagakit-skill-selector/recipes",
  "skills/harness/bagakit-skill-selector/references",
  "skills/harness/bagakit-skill-selector/scripts",
  "skills/harness/bagakit-skill-selector/scripts/lib",
  "gate_eval/skills/harness/bagakit-skill-selector",
  "gate_eval/skills/harness/bagakit-skill-selector/results",
  "gate_eval/skills/harness/bagakit-skill-selector/results/runs",
  "gate_validation/skills/harness/bagakit-skill-selector",
]
required_files = [
  "skills/harness/bagakit-skill-selector/README.md",
  "skills/harness/bagakit-skill-selector/SKILL.md",
  "skills/harness/bagakit-skill-selector/assets/daily-note.template.md",
  "skills/harness/bagakit-skill-selector/assets/project-preferences.template.toml",
  "skills/harness/bagakit-skill-selector/assets/skill-usage.template.toml",
  "skills/harness/bagakit-skill-selector/recipes/README.md",
  "skills/harness/bagakit-skill-selector/recipes/brainstorm-with-research.md",
  "skills/harness/bagakit-skill-selector/recipes/research-to-knowledge.md",
  "skills/harness/bagakit-skill-selector/recipes/brainstorm-review-loop.md",
  "skills/harness/bagakit-skill-selector/recipes/planning-entry-brainstorm-only.md",
