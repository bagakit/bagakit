version = 2

[[suite]]
id = "bagakit-grill-layout"
owner = "skills/harness/bagakit-grill"
description = "Require the canonical runtime layout for bagakit-grill."
default = true
proof_mode = "structural"
protects = ["bagakit-grill installable runtime layout, CLI declaration, frontdoor declaration, and run contract"]
oracle = ["fs runner checks required skill files, references, validation registration, and starter eval slice"]
exercised_surface = ["skills/harness/bagakit-grill runtime directory", "gate_validation/skills/harness/bagakit-grill registration", "gate_eval/skills/harness/bagakit-grill registration"]
proves = ["bagakit-grill-layout proves required bagakit-grill runtime files, CLI manifest, frontdoor rule, and eval registration are present."]
does_not_prove = ["bagakit-grill-layout does not prove live question quality or model judgment."]
validation_class = "structure"
groups = ["skills", "harness", "grill", "structure"]

[suite.runner]
kind = "fs"
required_dirs = [
  "skills/harness/bagakit-grill",
  "skills/harness/bagakit-grill/references",
  "skills/harness/bagakit-grill/scripts",
  "skills/harness/bagakit-grill/scripts/lib",
  "gate_validation/skills/harness/bagakit-grill",
  "gate_eval/skills/harness/bagakit-grill",
  "gate_eval/skills/harness/bagakit-grill/results",
  "gate_eval/skills/harness/bagakit-grill/results/runs",
]
required_files = [
  "skills/harness/bagakit-grill/README.md",
  "skills/harness/bagakit-grill/SKILL.md",
  "skills/harness/bagakit-grill/references/frontdoor-rule.toml",
  "skills/harness/bagakit-grill/references/skill-cli.toml",
  "skills/harness/bagakit-grill/references/grill-run-contract.md",
  "skills/harness/bagakit-grill/scripts/grill.sh",
  "skills/harness/bagakit-grill/scripts/grill.ts",
  "skills/harness/bagakit-grill/scripts/lib/model.ts",
  "skills/harness/bagakit-grill/scripts/lib/io.ts",
  "skills/harness/bagakit-grill/scripts/lib/planner.ts",
  "skills/harness/bagakit-grill/scripts/lib/render.ts",
  "gate_validation/skills/harness/bagakit-grill/validation.toml",
  "gate_validation/skills/harness/bagakit-grill/check-bagakit-grill.sh",
  "gate_eval/skills/harness/bagakit-grill/README.md",
  "gate_eval/skills/harness/bagakit-grill/validation.toml",
  "gate_eval/skills/harness/bagakit-grill/suite.ts",
  "gate_eval/skills/harness/bagakit-grill/results/.gitignore",
  "gate_eval/skills/harness/bagakit-grill/results/README.md",
  "gate_eval/skills/harness/bagakit-grill/results/runs/.gitkeep",
]
forbidden_paths = [
  "skills/harness/bagakit-grill/SKILL_PAYLOAD.json",
  "skills/harness/bagakit-grill/docs",
  "skills/harness/bagakit-grill/gate",
  "skills/harness/bagakit-grill/scripts_dev",
]

[[suite]]
id = "bagakit-grill-cli-smoke"
owner = "skills/harness/bagakit-grill"
description = "Run a deterministic grill lifecycle over one question and one research-needed node."
default = true
proof_mode = "runtime"
protects = ["bagakit-grill structured SSOT lifecycle, generated brief projection, and research-needed handoff node behavior"]
oracle = ["smoke script runs the skill-owned CLI in a temporary repo and inspects grill-run.json plus grill-brief.md"]
exercised_surface = ["bagakit-grill CLI", ".bagakit/grill/runs/<run-id>/grill-run.json", ".bagakit/grill/runs/<run-id>/grill-brief.md"]
proves = ["bagakit-grill-cli-smoke proves init, plan, next, answer, attach-evidence, render, and status update the structured run truth and generated summary view coherently."]
does_not_prove = ["bagakit-grill-cli-smoke does not prove stochastic question quality, live research quality, or user acceptance."]
timeout_seconds = 120
validation_class = "smoke"
groups = ["skills", "harness", "grill", "smoke"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/skills/harness/bagakit-grill/check-bagakit-grill.sh"
args = [
  "--root",
  "{repo_root}",
]
