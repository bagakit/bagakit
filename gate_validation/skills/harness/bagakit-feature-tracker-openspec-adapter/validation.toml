version = 2

[[suite]]
id = "bagakit-feature-tracker-openspec-adapter-layout"
owner = "skills/harness/bagakit-feature-tracker-openspec-adapter"
description = "Require the standalone OpenSpec adapter skill layout and keep bridge logic outside the canonical tracker runtime."
default = true
validation_class = "structure"
groups = ["skills", "harness", "feature-tracker-openspec-adapter", "structure"]

[suite.runner]
kind = "fs"
required_dirs = [
  "skills/harness/bagakit-feature-tracker-openspec-adapter",
  "skills/harness/bagakit-feature-tracker-openspec-adapter/scripts",
  "gate_eval/skills/harness/bagakit-feature-tracker-openspec-adapter",
  "gate_eval/skills/harness/bagakit-feature-tracker-openspec-adapter/results",
  "gate_eval/skills/harness/bagakit-feature-tracker-openspec-adapter/results/runs",
  "gate_validation/skills/harness/bagakit-feature-tracker-openspec-adapter",
]
required_files = [
  "skills/harness/bagakit-feature-tracker-openspec-adapter/README.md",
  "skills/harness/bagakit-feature-tracker-openspec-adapter/SKILL.md",
  "skills/harness/bagakit-feature-tracker-openspec-adapter/scripts/openspec-feature-adapter.sh",
  "skills/harness/bagakit-feature-tracker-openspec-adapter/scripts/openspec-feature-adapter.py",
  "gate_eval/skills/harness/bagakit-feature-tracker-openspec-adapter/README.md",
  "gate_eval/skills/harness/bagakit-feature-tracker-openspec-adapter/suite.ts",
  "gate_eval/skills/harness/bagakit-feature-tracker-openspec-adapter/validation.toml",
  "gate_eval/skills/harness/bagakit-feature-tracker-openspec-adapter/results/.gitignore",
  "gate_eval/skills/harness/bagakit-feature-tracker-openspec-adapter/results/README.md",
  "gate_eval/skills/harness/bagakit-feature-tracker-openspec-adapter/results/runs/.gitkeep",
  "gate_validation/skills/harness/bagakit-feature-tracker-openspec-adapter/validation.toml",
  "gate_validation/skills/harness/bagakit-feature-tracker-openspec-adapter/check-openspec-adapter.sh",
]
forbidden_paths = [
  "skills/harness/bagakit-feature-tracker-openspec-adapter/SKILL_PAYLOAD.json",
  "skills/harness/bagakit-feature-tracker-openspec-adapter/AGENTS.md",
  "skills/harness/bagakit-feature-tracker-openspec-adapter/Makefile",
  "skills/harness/bagakit-feature-tracker-openspec-adapter/docs",
  "skills/harness/bagakit-feature-tracker-openspec-adapter/scripts_dev",
]

[[suite]]
id = "bagakit-feature-tracker-openspec-adapter-smoke"
owner = "skills/harness/bagakit-feature-tracker-openspec-adapter"
description = "Run a minimal export and import cycle against the canonical tracker runtime through the explicit OpenSpec adapter."
default = true
validation_class = "smoke"
groups = ["skills", "harness", "feature-tracker-openspec-adapter", "smoke"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/skills/harness/bagakit-feature-tracker-openspec-adapter/check-openspec-adapter.sh"
args = [
  "--root",
  "{repo_root}",
]
