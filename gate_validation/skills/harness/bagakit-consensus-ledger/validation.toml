version = 2

[[suite]]
id = "bagakit-consensus-ledger-layout"
owner = "skills/harness/bagakit-consensus-ledger"
description = "Require the canonical runtime layout for bagakit-consensus-ledger."
default = true
proof_mode = "structural"
protects = ["bagakit-consensus-ledger installable runtime layout, CLI declaration, protocol reference, and shared spec"]
oracle = ["fs runner checks required skill files, references, validation registration, and forbids payload leaks"]
exercised_surface = ["skills/harness/bagakit-consensus-ledger runtime directory", "docs/specs/consensus-ledger-contract.md", "gate_validation/skills/harness/bagakit-consensus-ledger registration"]
proves = ["bagakit-consensus-ledger-layout proves required skill files, protocol references, CLI manifest, shared spec, and validation files are present."]
does_not_prove = ["bagakit-consensus-ledger-layout does not prove live agent judgment or downstream Spark/Grill adoption quality."]
validation_class = "structure"
groups = ["skills", "harness", "consensus-ledger", "structure"]

[suite.runner]
kind = "fs"
required_dirs = [
  "skills/harness/bagakit-consensus-ledger",
  "skills/harness/bagakit-consensus-ledger/agents",
  "skills/harness/bagakit-consensus-ledger/references",
  "skills/harness/bagakit-consensus-ledger/scripts",
  "gate_validation/skills/harness/bagakit-consensus-ledger",
]
required_files = [
  "docs/specs/consensus-ledger-contract.md",
  "skills/harness/bagakit-consensus-ledger/SKILL.md",
  "skills/harness/bagakit-consensus-ledger/agents/openai.yaml",
  "skills/harness/bagakit-consensus-ledger/references/consensus-ledger-protocol.md",
  "skills/harness/bagakit-consensus-ledger/references/frontdoor-rule.toml",
  "skills/harness/bagakit-consensus-ledger/references/skill-cli.toml",
  "skills/harness/bagakit-consensus-ledger/scripts/consensus-ledger.sh",
  "skills/harness/bagakit-consensus-ledger/scripts/consensus_ledger.py",
  "gate_validation/skills/harness/bagakit-consensus-ledger/validation.toml",
  "gate_validation/skills/harness/bagakit-consensus-ledger/check-consensus-ledger.sh",
]
forbidden_paths = [
  "skills/harness/bagakit-consensus-ledger/SKILL_PAYLOAD.json",
  "skills/harness/bagakit-consensus-ledger/docs",
  "skills/harness/bagakit-consensus-ledger/gate",
  "skills/harness/bagakit-consensus-ledger/scripts_dev",
]

[[suite]]
id = "bagakit-consensus-ledger-cli-smoke"
owner = "skills/harness/bagakit-consensus-ledger"
description = "Run a deterministic consensus-ledger lifecycle over standalone and embedded placements."
default = true
proof_mode = "runtime"
protects = ["consensus-ledger schema, embedded placement, standalone fallback, epistemic classes, item statuses, dimension links, tool-neutral evidence requirements, snapshots, render, and validation"]
oracle = ["smoke script runs the skill-owned CLI in a temporary repo and inspects ledger JSON plus generated markdown"]
exercised_surface = ["bagakit-consensus-ledger CLI", ".bagakit/consensus-ledger/ledgers/<ledger-id>/ledger.json", "<owner-dir>/consensus-ledger.json"]
proves = ["bagakit-consensus-ledger-cli-smoke proves init, add-dimension, add-item, add-question, add-evidence-requirement, satisfy-evidence, snapshot, render, status, and validate update structured ledger truth coherently."]
does_not_prove = ["bagakit-consensus-ledger-cli-smoke does not prove agent question quality, downstream Spark/Grill compliance, or promotion judgment."]
timeout_seconds = 120
validation_class = "smoke"
groups = ["skills", "harness", "consensus-ledger", "smoke"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/skills/harness/bagakit-consensus-ledger/check-consensus-ledger.sh"
args = [
  "--root",
  "{repo_root}",
]
