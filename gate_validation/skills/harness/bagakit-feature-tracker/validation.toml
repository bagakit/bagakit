version = 2

[[suite]]
id = "bagakit-feature-tracker-layout"
owner = "skills/harness/bagakit-feature-tracker"
description = "Require the canonical runtime layout and keep non-runtime repo artifacts out of bagakit-feature-tracker."
default = true
validation_class = "structure"
groups = ["skills", "harness", "feature-tracker", "structure"]

[suite.runner]
kind = "fs"
required_dirs = [
  "skills/harness/bagakit-feature-tracker",
  "skills/harness/bagakit-feature-tracker/references",
  "skills/harness/bagakit-feature-tracker/references/tpl",
  "skills/harness/bagakit-feature-tracker/scripts",
  "gate_eval/skills/harness/bagakit-feature-tracker",
  "gate_eval/skills/harness/bagakit-feature-tracker/results",
  "gate_eval/skills/harness/bagakit-feature-tracker/results/runs",
  "gate_validation/skills/harness/bagakit-feature-tracker",
]
required_files = [
  "skills/harness/bagakit-feature-tracker/README.md",
  "skills/harness/bagakit-feature-tracker/SKILL.md",
  "skills/harness/bagakit-feature-tracker/references/required-reading-manifest.json",
  "skills/harness/bagakit-feature-tracker/scripts/feature-tracker.sh",
  "skills/harness/bagakit-feature-tracker/scripts/feature-tracker.py",
  "gate_eval/skills/harness/bagakit-feature-tracker/README.md",
  "gate_eval/skills/harness/bagakit-feature-tracker/suite.ts",
  "gate_eval/skills/harness/bagakit-feature-tracker/validation.toml",
  "gate_eval/skills/harness/bagakit-feature-tracker/results/.gitignore",
  "gate_eval/skills/harness/bagakit-feature-tracker/results/README.md",
  "gate_eval/skills/harness/bagakit-feature-tracker/results/runs/.gitkeep",
  "gate_validation/skills/harness/bagakit-feature-tracker/validation.toml",
  "gate_validation/skills/harness/bagakit-feature-tracker/check-feature-tracker.sh",
  "gate_validation/skills/harness/bagakit-feature-tracker/check-feature-tracker-concurrency.sh",
  "gate_validation/skills/harness/bagakit-feature-tracker/check-feature-tracker-regression.sh",
  "gate_validation/skills/harness/bagakit-feature-tracker/lib/feature-tracker-testlib.sh",
]
forbidden_paths = [
  "skills/harness/bagakit-feature-tracker/SKILL_PAYLOAD.json",
  "skills/harness/bagakit-feature-tracker/AGENTS.md",
  "skills/harness/bagakit-feature-tracker/Makefile",
  "skills/harness/bagakit-feature-tracker/docs",
  "skills/harness/bagakit-feature-tracker/scripts_dev",
  "skills/harness/bagakit-feature-tracker/scripts/feat-task-harness.sh",
  "skills/harness/bagakit-feature-tracker/scripts/feat-task-harness.py",
  "skills/harness/bagakit-feature-tracker/scripts/import-openspec-change.py",
  "skills/harness/bagakit-feature-tracker/scripts/export-feature-to-openspec.py",
  "skills/harness/bagakit-feature-tracker/references/required-reading-manifest-openspec.json",
  "skills/harness/bagakit-feature-tracker-openspec-adapter",
  "gate_eval/skills/harness/bagakit-feature-tracker-openspec-adapter",
  "gate_validation/skills/harness/bagakit-feature-tracker-openspec-adapter",
  "skills/harness/bagakit-feature-tracker/references/tpl/inbox-decision-template.md",
  "skills/harness/bagakit-feature-tracker/references/tpl/inbox-gotcha-template.md",
  "skills/harness/bagakit-feature-tracker/references/tpl/inbox-howto-template.md",
]

[[suite]]
id = "bagakit-feature-tracker-smoke"
owner = "skills/harness/bagakit-feature-tracker"
description = "Run a minimal feature-tracker lifecycle: initialize, create feature, assign workspace, start task, and replan."
default = true
validation_class = "smoke"
groups = ["skills", "harness", "feature-tracker", "smoke"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/skills/harness/bagakit-feature-tracker/check-feature-tracker.sh"
args = [
  "--root",
  "{repo_root}",
]

[[suite]]
id = "bagakit-feature-tracker-concurrency-regression"
owner = "skills/harness/bagakit-feature-tracker"
description = "Keep concurrent tracker state mutation serialized while worktree task gates and commits execute from the assigned feature branch."
default = true
validation_class = "quality"
groups = ["skills", "harness", "feature-tracker", "quality", "concurrency"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/skills/harness/bagakit-feature-tracker/check-feature-tracker-concurrency.sh"
args = [
  "--root",
  "{repo_root}",
]

[[suite]]
id = "bagakit-feature-tracker-legacy-regression"
owner = "skills/harness/bagakit-feature-tracker"
description = "Keep legacy docs-side inbox paths untouched on archive flows and keep pre-v2 tracker runtime layouts rejected while the canonical lifecycle stays isolated in smoke."
default = true
validation_class = "quality"
groups = ["skills", "harness", "feature-tracker", "quality", "legacy"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/skills/harness/bagakit-feature-tracker/check-feature-tracker-regression.sh"
args = [
  "--root",
  "{repo_root}",
]
