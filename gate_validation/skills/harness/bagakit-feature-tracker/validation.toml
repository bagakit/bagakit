[[suite]]
id = "bagakit-feature-tracker-smoke"
owner = "skills/harness/bagakit-feature-tracker"
description = "Run a minimal feature-tracker lifecycle: initialize, create feature, assign workspace, start task, and replan."
default = true
proof_mode = "runtime"
protects = ["feature-tracker public lifecycle for initialization, feature creation, workspace assignment, task start, and replan state"]
oracle = ["smoke script drives feature-tracker CLI commands in a temporary repo and checks resulting tracker state and command outputs"]
exercised_surface = ["feature-tracker CLI", ".bagakit/feature-tracker state files", "gate_validation feature-tracker smoke fixture"]
proves = ["bagakit-feature-tracker-smoke proves: Run a minimal feature-tracker lifecycle: initialize, create feature, assign workspace, start task, and replan."]
does_not_prove = ["bagakit-feature-tracker-smoke does not prove live service behavior, stochastic agent quality, or unrelated repository surfaces."]
timeout_seconds = 300
validation_class = "smoke"
groups = ["skills", "harness", "feature-tracker", "smoke"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/skills/harness/bagakit-feature-tracker/check-feature-tracker.sh"
args = [
  "--root",
  "{repo_root}",
]

[[suite]]
id = "bagakit-feature-tracker-concurrency-regression"
owner = "skills/harness/bagakit-feature-tracker"
description = "Keep concurrent tracker state mutation serialized while worktree task gates and commits execute from the assigned feature branch."
default = true
proof_mode = "state_machine"
protects = ["feature-tracker serialized state mutation across concurrent task gate and commit flows"]
oracle = ["concurrency regression script runs competing tracker operations and checks final state, lock behavior, branch routing, and emitted errors"]
exercised_surface = ["feature-tracker CLI commands", ".bagakit/feature-tracker state files", "temporary git worktree branches"]
proves = ["bagakit-feature-tracker-concurrency-regression proves: Keep concurrent tracker state mutation serialized while worktree task gates and commits execute from the assigned feature branch."]
does_not_prove = ["bagakit-feature-tracker-concurrency-regression does not prove live service behavior, stochastic agent quality, or unrelated workflows."]
timeout_seconds = 300
validation_class = "quality"
groups = ["skills", "harness", "feature-tracker", "quality", "concurrency"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/skills/harness/bagakit-feature-tracker/check-feature-tracker-concurrency.sh"
args = [
  "--root",
  "{repo_root}",
]

[[suite]]
id = "bagakit-feature-tracker-legacy-regression"
owner = "skills/harness/bagakit-feature-tracker"
description = "Keep legacy docs-side inbox paths untouched on archive flows and keep pre-v2 tracker runtime layouts rejected while the canonical lifecycle stays isolated in smoke."
default = true
proof_mode = "state_machine"
protects = ["feature-tracker archive behavior around legacy docs-side inbox files and rejection of pre-v2 runtime layouts"]
oracle = ["legacy regression script executes archive and validation flows, hashes legacy inbox files, and asserts expected failure messages for obsolete layouts"]
exercised_surface = ["feature-tracker CLI archive/validate commands", "legacy docs/.bagakit/inbox files", ".bagakit/feature-tracker runtime state"]
proves = ["bagakit-feature-tracker-legacy-regression proves: Keep legacy docs-side inbox paths untouched on archive flows and keep pre-v2 tracker runtime layouts rejected while the canonical lifecycle stays isolated in smoke."]
does_not_prove = ["bagakit-feature-tracker-legacy-regression does not prove live service behavior, stochastic agent quality, or unrelated workflows."]
timeout_seconds = 300
validation_class = "quality"
groups = ["skills", "harness", "feature-tracker", "quality", "legacy"]

[suite.runner]
kind = "bash_script"
script = "gate_validation/skills/harness/bagakit-feature-tracker/check-feature-tracker-regression.sh"
args = [
  "--root",
  "{repo_root}",
]
