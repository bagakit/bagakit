version = 2

[[suite]]
id = "validator-framework-config"
owner = "dev/validator"
description = "Load and normalize the repo validation graph through the validator framework."
default = true
proof_mode = "runtime"
protects = ["validator registration graph loading and metadata normalization"]
oracle = ["validator check-config exits successfully after parsing every discovered validation.toml"]
exercised_surface = ["dev/validator CLI check-config command over gate_validation/validation.toml"]
proves = ["validator-framework-config proves: Load and normalize the repo validation graph through the validator framework."]
does_not_prove = ["validator-framework-config does not prove live service behavior, stochastic agent quality, or unrelated repository surfaces."]
timeout_seconds = 120
validation_class = "tooling"
groups = ["validator", "smoke"]
default_params = ["baseline"]

[suite.runner]
kind = "executable"
command = "{node}"
args = [
  "--experimental-strip-types",
  "dev/validator/src/cli.ts",
  "check-config",
]

[suite.params]
baseline = [
  "--root",
  "{repo_root}",
  "--config",
  "gate_validation/validation.toml",
]

[[suite]]
id = "validator-tests"
owner = "dev/validator"
description = "Run the validator framework regression suite."
default = true
proof_mode = "runtime"
protects = ["validator framework parser, loader, selector, runner, audit, and timeout regression behavior"]
oracle = ["node:test regression suite asserts validator outputs, thrown configuration errors, runner results, and timeout failures"]
exercised_surface = ["dev/validator/test/validator.test.ts", "dev/validator/src CLI and library exports", "temporary validation.toml fixtures"]
proves = ["validator-tests proves: Run the validator framework regression suite."]
does_not_prove = ["validator-tests does not prove live service behavior, stochastic agent quality, or unrelated repository surfaces."]
timeout_seconds = 180
validation_class = "quality"
groups = ["validator", "quality"]

[suite.runner]
kind = "executable"
command = "{node}"
args = [
  "--test",
  "--experimental-strip-types",
  "dev/validator/test/validator.test.ts",
]
