name: blog-pages

on:
  push:
    branches:
      - main
    paths:
      - "blogs/**"
      - "scripts/build-blog-pages.py"
      - ".github/workflows/blog-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install markdown renderer
        run: python3 -m pip install --disable-pip-version-check markdown

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build blog site
        run: |
          python3 scripts/build-blog-pages.py \
            --input blogs \
            --output site \
            --repo-url "https://github.com/${{ github.repository }}" \
            --default-branch "${{ github.ref_name }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
