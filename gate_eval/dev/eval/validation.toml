version = 2

[[suite]]
id = "dev-eval-fixture-suite"
owner = "gate_eval/dev/eval"
description = "Dogfood the shared dev/eval runner and packet contract."
default = true
proof_mode = "runtime"
protects = ["shared dev/eval runner packet contract, path sanitization, dataset commands, and bounded agent-session substrate"]
oracle = ["dogfood script runs passing and failing fixture suites, reads generated summary/case JSON, and asserts schemas, sanitized paths, and dataset outputs"]
exercised_surface = ["gate_eval/dev/eval/run_eval.ts", "dev/eval/src/cli.ts", "gate_eval/dev/eval fixture and failure suites", "generated eval packet files"]
proves = ["dev-eval-fixture-suite proves the shared eval runner can execute deterministic fixture suites and produce sanitized structured packets."]
does_not_prove = ["dev-eval-fixture-suite does not prove individual skill quality or release-blocking behavior."]
timeout_seconds = 180
validation_class = "quality"
groups = ["dev", "eval", "quality", "packet"]

[suite.runner]
kind = "executable"
command = "{node}"
args = [
  "--experimental-strip-types",
  "gate_eval/dev/eval/run_eval.ts",
]
