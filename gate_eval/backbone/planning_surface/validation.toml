version = 2

[[suite]]
id = "planning-surface-eval-structure"
owner = "gate_eval/backbone/planning_surface"
description = "Require the comparative planning-surface eval slice files."
default = true
proof_mode = "structural"
protects = ["comparative planning-surface eval slice layout and results directory readiness"]
oracle = ["fs runner checks required eval suite files and results directories under gate_eval/backbone/planning_surface"]
exercised_surface = ["gate_eval/backbone/planning_surface suite files and results folders"]
proves = ["planning-surface-eval-structure proves the comparative planning-surface eval slice can be discovered and has its required local artifacts."]
does_not_prove = ["planning-surface-eval-structure does not prove comparative eval quality, external skill availability, or planning behavior."]
validation_class = "structure"
groups = ["planning", "eval", "backbone", "structure"]

[suite.runner]
kind = "fs"
required_dirs = [
  "gate_eval/backbone/planning_surface",
  "gate_eval/backbone/planning_surface/results",
  "gate_eval/backbone/planning_surface/results/runs",
]
required_files = [
  "gate_eval/backbone/planning_surface/README.md",
  "gate_eval/backbone/planning_surface/suite.ts",
  "gate_eval/backbone/planning_surface/validation.toml",
  "gate_eval/backbone/planning_surface/results/.gitignore",
  "gate_eval/backbone/planning_surface/results/README.md",
  "gate_eval/backbone/planning_surface/results/runs/.gitkeep",
]

[[suite]]
id = "planning-surface-eval-run"
owner = "gate_eval/backbone/planning_surface"
description = "Run the comparative planning-surface eval against the current repo and installed planning-with-files skill."
default = false
proof_mode = "runtime"
protects = ["comparative planning-surface evaluation between Bagakit planning surfaces and the installed planning-with-files reference"]
oracle = ["shared dev/eval runner executes the planning_surface suite and writes structured eval case packets and summary output"]
exercised_surface = ["gate_eval/backbone/planning_surface/suite.ts", "dev/eval/src/cli.ts eval runner", "planning surface runtime commands"]
proves = ["planning-surface-eval-run proves the comparative eval harness can execute its configured planning-surface cases in the local environment."]
does_not_prove = ["planning-surface-eval-run does not prove release readiness because it is an opt-in comparative eval, not a default gate."]
timeout_seconds = 300
validation_class = "quality"
groups = ["planning", "eval", "backbone", "comparison"]

[suite.runner]
kind = "executable"
command = "{node}"
args = [
  "--experimental-strip-types",
  "dev/eval/src/cli.ts",
  "run",
  "--root",
  "{repo_root}",
  "--suite",
  "gate_eval/backbone/planning_surface/suite.ts",
]
