version = 2

[[suite]]
id = "skill-surface-deterministic-eval"
owner = "gate_eval/backbone/skill"
description = "Run the deterministic non-gating eval suite for the repo skill surface."
default = true
proof_mode = "runtime"
protects = ["deterministic eval coverage for repo skill surface discovery, packaging, payload hygiene, and fixture behavior"]
oracle = ["backbone skill eval runner materializes fixture skills, executes skill surface commands, and asserts structured case results"]
exercised_surface = ["gate_eval/backbone/skill/run_eval.mjs", "gate_eval/backbone/skill fixtures and cases", "scripts/skill.ts skill surface"]
proves = ["skill-surface-deterministic-eval proves the non-gating skill-surface eval runner can execute deterministic fixture cases and record outcomes."]
does_not_prove = ["skill-surface-deterministic-eval does not prove stochastic agent skill quality or release-blocking correctness."]
timeout_seconds = 180
validation_class = "quality"
groups = ["skill", "eval", "deterministic", "quality", "backbone"]

[suite.runner]
kind = "executable"
command = "{node}"
args = [
  "gate_eval/backbone/skill/run_eval.mjs",
]
