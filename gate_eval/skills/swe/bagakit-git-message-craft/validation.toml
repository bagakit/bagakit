version = 2

[[suite]]
id = "bagakit-git-message-craft-shared-runner-eval"
owner = "gate_eval/skills/swe/bagakit-git-message-craft"
description = "Run deterministic non-gating eval for git-message-craft behavior-eval readiness, draft quality, and archive quality."
default = true
proof_mode = "runtime"
protects = ["git-message-craft eval cases for activation routing, paired agent-behavior evaluation readiness, draft quality, split strategy, archive quality, and payload-boundary behavior"]
oracle = ["shared dev/eval runner validates the owned paired-session behavior dataset and executes git-message-craft suite cases against deterministic git fixtures"]
exercised_surface = ["gate_eval/skills/swe/bagakit-git-message-craft/suite.ts", "gate_eval/skills/swe/bagakit-git-message-craft/cases/agent-behavior-eval-dataset.json", "dev/eval/src/cli.ts eval runner", "git-message-craft CLI outputs and archive artifacts"]
proves = ["bagakit-git-message-craft-shared-runner-eval proves the paired-session behavior contract is structurally runnable and deterministic git-message-craft eval cases execute and record draft/archive findings."]
does_not_prove = ["bagakit-git-message-craft-shared-runner-eval does not prove skill activation improves agent behavior until paired sessions are executed, nor every future message decision or human review outcome."]
timeout_seconds = 180
validation_class = "quality"
groups = ["skills", "swe", "git-message-craft", "eval", "quality"]

[suite.runner]
kind = "executable"
command = "{node}"
args = [
  "--experimental-strip-types",
  "dev/eval/src/cli.ts",
  "run",
  "--root",
  "{repo_root}",
  "--suite",
  "gate_eval/skills/swe/bagakit-git-message-craft/suite.ts",
]
