version = 2

[[suite]]
id = "bagakit-daily-media-automation-shared-runner-eval"
owner = "gate_eval/skills/swe/bagakit-daily-media-automation"
description = "Run deterministic non-gating eval for agent-behavior readiness, domain-pack initialization, run ledgers, no-publish blockers, and validation outcomes."
default = true
proof_mode = "runtime"
protects = ["daily-media-automation eval cases for golden-path activation, direct component routing, publication side-effect control, and recurring research-to-publication orchestration behavior"]
oracle = ["shared dev/eval runner validates the owned paired-session behavior dataset and executes daily-media-automation cases against local fixture runs"]
exercised_surface = ["gate_eval/skills/swe/bagakit-daily-media-automation/suite.ts", "gate_eval/skills/swe/bagakit-daily-media-automation/cases/agent-behavior-eval-dataset.json", "dev/eval/src/cli.ts eval runner", "daily-media-automation CLI outputs and run ledgers"]
proves = ["bagakit-daily-media-automation-shared-runner-eval proves the paired-session behavior contract is structurally runnable plus deterministic fixture behavior for domain-pack initialization, draft and publish ledgers, and status separation."]
does_not_prove = ["bagakit-daily-media-automation-shared-runner-eval does not prove skill activation improves agent behavior until paired sessions are executed, nor live provider success or stochastic editorial quality."]
timeout_seconds = 180
validation_class = "quality"
groups = ["skills", "swe", "daily-media-automation", "eval", "quality"]

[suite.runner]
kind = "executable"
command = "{node}"
args = [
  "--experimental-strip-types",
  "dev/eval/src/cli.ts",
  "run",
  "--root",
  "{repo_root}",
  "--suite",
  "gate_eval/skills/swe/bagakit-daily-media-automation/suite.ts",
]
