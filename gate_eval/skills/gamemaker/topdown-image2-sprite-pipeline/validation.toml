version = 2

[[suite]]
id = "topdown-image2-sprite-pipeline-behavior-starter-eval"
owner = "gate_eval/skills/gamemaker/topdown-image2-sprite-pipeline"
description = "Run deterministic non-gating eval for sprite package handoff review behavior."
default = true
proof_mode = "runtime"
protects = ["topdown image2 sprite handoff rejects incomplete packages and preserves provenance/visual review ownership"]
oracle = ["shared dev/eval runner executes the Topdown Image2 Sprite Pipeline behavior starter suite against the public CLI"]
exercised_surface = ["gate_eval/skills/gamemaker/topdown-image2-sprite-pipeline/suite.ts", "skills/gamemaker/topdown-image2-sprite-pipeline/scripts/topdown-image2-sprite-pipeline-cli.sh"]
proves = ["topdown-image2-sprite-pipeline-behavior-starter-eval proves deterministic package handoff review behavior is executable through the CLI."]
does_not_prove = ["topdown-image2-sprite-pipeline-behavior-starter-eval does not prove live image quality, visual taste, or release-blocking correctness."]
timeout_seconds = 180
validation_class = "quality"
groups = ["skills", "gamemaker", "sprite", "eval", "quality"]

[suite.runner]
kind = "executable"
command = "{node}"
args = [
  "--experimental-strip-types",
  "dev/eval/src/cli.ts",
  "run",
  "--root",
  "{repo_root}",
  "--suite",
  "gate_eval/skills/gamemaker/topdown-image2-sprite-pipeline/suite.ts",
]
