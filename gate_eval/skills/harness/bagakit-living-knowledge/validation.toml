version = 2

[[suite]]
id = "bagakit-living-knowledge-shared-runner-eval"
owner = "gate_eval/skills/harness/bagakit-living-knowledge"
description = "Run deterministic non-gating eval for living-knowledge recall and ingestion quality."
default = true
proof_mode = "runtime"
protects = ["living-knowledge eval cases for recall, ingestion, generated guide usefulness, and low-leakage behavior"]
oracle = ["shared dev/eval runner executes living-knowledge suite cases and checks structured outputs from deterministic workspace fixtures"]
exercised_surface = ["gate_eval/skills/harness/bagakit-living-knowledge/suite.ts", "dev/eval/src/cli.ts eval runner", "living-knowledge CLI and generated knowledge files"]
proves = ["bagakit-living-knowledge-shared-runner-eval proves deterministic living-knowledge eval cases execute and record recall/ingestion findings."]
does_not_prove = ["bagakit-living-knowledge-shared-runner-eval does not prove long-term memory quality, stochastic agent recall, or release-blocking correctness."]
timeout_seconds = 180
validation_class = "quality"
groups = ["skills", "harness", "living-knowledge", "eval", "quality"]

[suite.runner]
kind = "executable"
command = "{node}"
args = [
  "--experimental-strip-types",
  "dev/eval/src/cli.ts",
  "run",
  "--root",
  "{repo_root}",
  "--suite",
  "gate_eval/skills/harness/bagakit-living-knowledge/suite.ts",
]
