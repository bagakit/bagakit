version = 2

[[suite]]
id = "bagakit-brainstorm-shared-runner-eval"
owner = "gate_eval/skills/harness/bagakit-brainstorm"
description = "Run deterministic non-gating eval for brainstorm init-time review surfaces and status reporting."
default = true
proof_mode = "runtime"
protects = ["brainstorm eval cases for init-time review surfaces, status reporting, and archive-quality signals"]
oracle = ["shared dev/eval runner executes the brainstorm suite and asserts structured case outputs against deterministic fixtures"]
exercised_surface = ["gate_eval/skills/harness/bagakit-brainstorm/suite.ts", "dev/eval/src/cli.ts eval runner", "brainstorm operator surfaces under test"]
proves = ["bagakit-brainstorm-shared-runner-eval proves deterministic brainstorm eval cases execute and emit reviewable eval packets."]
does_not_prove = ["bagakit-brainstorm-shared-runner-eval does not prove live brainstorm quality, agent judgment, or release-blocking correctness."]
timeout_seconds = 180
validation_class = "quality"
groups = ["skills", "harness", "brainstorm", "eval", "quality"]

[suite.runner]
kind = "executable"
command = "{node}"
args = [
  "--experimental-strip-types",
  "dev/eval/src/cli.ts",
  "run",
  "--root",
  "{repo_root}",
  "--suite",
  "gate_eval/skills/harness/bagakit-brainstorm/suite.ts",
]
