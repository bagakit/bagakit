version = 2

[[suite]]
id = "bagakit-spark-behavior-starter-eval"
owner = "gate_eval/skills/harness/bagakit-spark"
description = "Run deterministic non-gating eval for Spark accepted-snapshot and premature-closure review surfaces."
default = true
proof_mode = "runtime"
protects = ["spark review packet behavior for accepted snapshot closure, weak questions, research gaps, and next action handoff"]
oracle = ["shared dev/eval runner executes the Spark behavior starter suite against deterministic fixtures"]
exercised_surface = ["gate_eval/skills/harness/bagakit-spark/suite.ts", "skills/harness/bagakit-spark/references/review-packet-template.md"]
proves = ["bagakit-spark-behavior-starter-eval proves deterministic Spark closure review fixtures are represented by the public review packet contract."]
does_not_prove = ["bagakit-spark-behavior-starter-eval does not prove live dialogue quality, model judgment, or release-blocking correctness."]
timeout_seconds = 120
validation_class = "quality"
groups = ["skills", "harness", "spark", "eval", "quality"]

[suite.runner]
kind = "executable"
command = "{node}"
args = [
  "--experimental-strip-types",
  "dev/eval/src/cli.ts",
  "run",
  "--root",
  "{repo_root}",
  "--suite",
  "gate_eval/skills/harness/bagakit-spark/suite.ts",
]
