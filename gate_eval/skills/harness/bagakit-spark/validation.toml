version = 2

[[suite]]
id = "bagakit-spark-behavior-starter-eval"
owner = "gate_eval/skills/harness/bagakit-spark"
description = "Run deterministic non-gating eval for Spark closure, option-surface, evidence-route, and serious-moment goal-case coverage."
default = true
proof_mode = "runtime"
protects = ["spark review behavior for accepted snapshot closure, weak questions, option surfaces, sufficient evidence routing, and next action handoff"]
oracle = ["shared dev/eval runner executes the Spark behavior starter suite against deterministic fixtures"]
exercised_surface = ["gate_eval/skills/harness/bagakit-spark/suite.ts", "gate_eval/skills/harness/bagakit-spark/cases/serious-moments.json", "skills/harness/bagakit-spark/references/decision-quality-contract.toml"]
proves = ["bagakit-spark-behavior-starter-eval proves deterministic Spark closure and option-surface rules are represented, and sanitized serious-moment cases map to structured final-goal guards with baseline/candidate coverage evidence."]
does_not_prove = ["bagakit-spark-behavior-starter-eval does not prove live dialogue quality, three-trial reliability, human preference agreement, route judgment, prototype quality, or release-blocking correctness."]
timeout_seconds = 120
validation_class = "quality"
groups = ["skills", "harness", "spark", "eval", "quality"]

[suite.runner]
kind = "executable"
command = "{node}"
args = [
  "--experimental-strip-types",
  "dev/eval/src/cli.ts",
  "run",
  "--root",
  "{repo_root}",
  "--suite",
  "gate_eval/skills/harness/bagakit-spark/suite.ts",
]
