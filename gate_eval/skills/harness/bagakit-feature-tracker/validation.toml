version = 2

[[suite]]
id = "bagakit-feature-tracker-shared-runner-eval"
owner = "gate_eval/skills/harness/bagakit-feature-tracker"
description = "Run deterministic non-gating eval for feature-tracker lifecycle and status projection quality."
default = true
proof_mode = "runtime"
protects = ["feature-tracker eval cases for lifecycle semantics, status projection quality, and operator-output usefulness"]
oracle = ["shared dev/eval runner executes feature-tracker suite cases and checks generated eval packets from deterministic temporary repos"]
exercised_surface = ["gate_eval/skills/harness/bagakit-feature-tracker/suite.ts", "dev/eval/src/cli.ts eval runner", "feature-tracker CLI and status outputs"]
proves = ["bagakit-feature-tracker-shared-runner-eval proves deterministic feature-tracker eval cases execute and record lifecycle/status findings."]
does_not_prove = ["bagakit-feature-tracker-shared-runner-eval does not prove every feature-tracker workflow, stochastic agent behavior, or release-blocking correctness."]
timeout_seconds = 180
validation_class = "quality"
groups = ["skills", "harness", "feature-tracker", "eval", "quality"]

[suite.runner]
kind = "executable"
command = "{node}"
args = [
  "--experimental-strip-types",
  "dev/eval/src/cli.ts",
  "run",
  "--root",
  "{repo_root}",
  "--suite",
  "gate_eval/skills/harness/bagakit-feature-tracker/suite.ts",
]
