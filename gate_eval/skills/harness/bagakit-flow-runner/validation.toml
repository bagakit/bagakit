version = 2

[[suite]]
id = "bagakit-flow-runner-shared-runner-eval"
owner = "gate_eval/skills/harness/bagakit-flow-runner"
description = "Run deterministic non-gating eval for flow-runner next-action and closeout signaling quality."
default = true
proof_mode = "runtime"
protects = ["flow-runner eval cases for next-action clarity, checkpoint closeout signaling, and handoff usefulness"]
oracle = ["shared dev/eval runner executes flow-runner suite cases and asserts structured eval packet outputs from deterministic fixtures"]
exercised_surface = ["gate_eval/skills/harness/bagakit-flow-runner/suite.ts", "dev/eval/src/cli.ts eval runner", "flow-runner CLI and generated runtime artifacts"]
proves = ["bagakit-flow-runner-shared-runner-eval proves deterministic flow-runner eval cases execute and record next-action/closeout findings."]
does_not_prove = ["bagakit-flow-runner-shared-runner-eval does not prove every flow-runner workflow, live agent execution, or release-blocking correctness."]
timeout_seconds = 180
validation_class = "quality"
groups = ["skills", "harness", "flow-runner", "eval", "quality"]

[suite.runner]
kind = "executable"
command = "{node}"
args = [
  "--experimental-strip-types",
  "dev/eval/src/cli.ts",
  "run",
  "--root",
  "{repo_root}",
  "--suite",
  "gate_eval/skills/harness/bagakit-flow-runner/suite.ts",
]
