version = 2

[[suite]]
id = "bagakit-researcher-shared-runner-eval"
owner = "gate_eval/skills/harness/bagakit-researcher"
description = "Run deterministic non-gating eval for researcher evidence and survey linkage with the shared dev/eval runner."
default = true
proof_mode = "runtime"
protects = ["researcher eval cases for evidence linkage, pre-retrieval survey packets, synthesis quality signals, wiki/frontdoor behavior, and source-bound artifact discipline"]
oracle = ["shared dev/eval runner executes researcher suite cases and checks structured eval packets from deterministic research workspaces"]
exercised_surface = ["gate_eval/skills/harness/bagakit-researcher/suite.ts", "dev/eval/src/cli.ts eval runner", "researcher CLI topic artifacts and wiki outputs"]
proves = ["bagakit-researcher-shared-runner-eval proves deterministic researcher eval cases execute and record evidence-linkage findings."]
does_not_prove = ["bagakit-researcher-shared-runner-eval does not prove frontier research quality, stochastic source selection, or release-blocking correctness."]
timeout_seconds = 180
validation_class = "quality"
groups = ["skills", "harness", "researcher", "eval", "quality"]

[suite.runner]
kind = "executable"
command = "{node}"
args = [
  "--experimental-strip-types",
  "dev/eval/src/cli.ts",
  "run",
  "--root",
  "{repo_root}",
  "--suite",
  "gate_eval/skills/harness/bagakit-researcher/suite.ts",
]
