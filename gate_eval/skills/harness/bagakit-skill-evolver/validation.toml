version = 2

[[suite]]
id = "bagakit-skill-evolver-deterministic-eval"
owner = "gate_eval/skills/harness/bagakit-skill-evolver"
description = "Run deterministic non-gating eval for the evolver runtime closure surface."
default = true
proof_mode = "runtime"
protects = ["skill-evolver eval cases for reviewed session intake, runtime closure, promotion readiness, handoff usefulness, and archive semantics"]
oracle = ["shared dev/eval runner executes skill-evolver suite cases and checks structured outputs from deterministic evolver workspaces"]
exercised_surface = ["gate_eval/skills/harness/bagakit-skill-evolver/suite.ts", "dev/eval/src/cli.ts eval runner", "skill-evolver CLI, .mem_inbox signals, and .bagakit/evolver artifacts"]
proves = ["bagakit-skill-evolver-deterministic-eval proves deterministic skill-evolver eval cases execute and record runtime-closure findings."]
does_not_prove = ["bagakit-skill-evolver-deterministic-eval does not prove long-lived evolution quality, human approval, or release-blocking correctness."]
timeout_seconds = 180
validation_class = "quality"
groups = ["skills", "harness", "evolver", "eval", "quality"]

[suite.runner]
kind = "executable"
command = "{node}"
args = [
  "--experimental-strip-types",
  "dev/eval/src/cli.ts",
  "run",
  "--root",
  "{repo_root}",
  "--suite",
  "gate_eval/skills/harness/bagakit-skill-evolver/suite.ts",
]
