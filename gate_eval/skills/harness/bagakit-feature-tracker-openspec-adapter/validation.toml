version = 2

[[suite]]
id = "bagakit-feature-tracker-openspec-adapter-shared-runner-eval"
owner = "gate_eval/skills/harness/bagakit-feature-tracker-openspec-adapter"
description = "Run deterministic non-gating eval for OpenSpec adapter round-trip fidelity."
default = true
validation_class = "quality"
groups = ["skills", "harness", "feature-tracker-openspec-adapter", "eval", "quality"]

[suite.runner]
kind = "executable"
command = "{node}"
args = [
  "--experimental-strip-types",
  "dev/eval/src/cli.ts",
  "run",
  "--root",
  "{repo_root}",
  "--suite",
  "gate_eval/skills/harness/bagakit-feature-tracker-openspec-adapter/suite.ts",
]
