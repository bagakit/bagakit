[[guard]]
id = "reference-first"
protects = "implementation must not begin from text alone when a stronger or generated design reference is required"
proof_surface = "reference-intent plus design-reference artifact"

[[guard]]
id = "reference-provenance"
protects = "generated or provided references must have auditable source class and must not be replaced by agent-authored browser HTML"
proof_surface = "reference-provenance-ledger plus design-reference artifact"

[[guard]]
id = "image2-reference-authority"
protects = "when no stronger external reference exists, visual completion requires a saved Image2 design artifact instead of a coded HTML design source"
proof_surface = "reference-provenance-ledger plus design-reference artifact plus image-prompt retry evidence when blocked"

[[guard]]
id = "reference-survey-before-design"
protects = "high-craft or no-reference design drafts must be shaped by comparable product references instead of invented without research"
proof_surface = "reference-survey-ledger plus reference-intent plus image-prompt or design-reference"

[[guard]]
id = "comparative-reference-tier"
protects = "final design review must not accept a draft that is weaker than the recorded reference tier in information clarity, density, composition, or craft"
proof_surface = "reference-survey-ledger plus comparative-design-review plus visual-judge-scorecards"

[[guard]]
id = "skill-quality-no-reference-invalid"
protects = "skill-quality validation experiments must stop as invalid when neither external_strong nor image2_filesystem reference exists"
proof_surface = "reference-provenance-ledger plus design-reference artifact"

[[guard]]
id = "browser-evidence-preservation"
protects = "browser interaction, console, and overflow checks must be preserved as concrete evidence"
proof_surface = "browser-check-results artifact plus interaction-parity-ledger"

[[guard]]
id = "browser-evidence-assertion-integrity"
protects = "browser checks marked ok must prove expected state equals actual observed state"
proof_surface = "browser-check-results artifact with expected and actual values plus interaction-parity-ledger"

[[guard]]
id = "state-reference-authority"
protects = "state boards must extend the accepted reference instead of copying an under-review implementation"
proof_surface = "reference-intent plus state-reference-set"

[[guard]]
id = "affordance-honesty"
protects = "visible live-looking controls must be implemented, disabled, hidden, or explicitly out of scope"
proof_surface = "affordance-inventory plus behavior-matrix"

[[guard]]
id = "nonhappy-primary-action-safety"
protects = "primary commit actions in blocked states must not create final completion or queue receipts without recovery"
proof_surface = "behavior-matrix plus browser-check-results blocked-state interaction evidence"

[[guard]]
id = "affordance-classification-integrity"
protects = "each affordance must have one mutually exclusive classification"
proof_surface = "affordance-inventory"

[[guard]]
id = "working-affordance-evidence-coverage"
protects = "every working affordance must map to saved structured browser-check evidence"
proof_surface = "affordance-inventory plus behavior-matrix plus browser-check-results"

[[guard]]
id = "dynamic-affordance-granularity"
protects = "generated or repeated controls must be inventoried as concrete visible instances, not only wildcard groups"
proof_surface = "affordance-inventory plus browser-check-results"

[[guard]]
id = "mobile-mode-distinctness"
protects = "mobile tabs and segmented modes must expose distinct content or workflow scope"
proof_surface = "mobile screenshots plus interaction-parity-ledger"

[[guard]]
id = "reference-coverage"
protects = "implementation coverage must be judged against the reference, not only the built page"
proof_surface = "reference-coverage-matrix plus visual-parity-ledger"

[[guard]]
id = "information-architecture"
protects = "complex product screens must expose object taxonomy, region ownership, and information scent"
proof_surface = "information-architecture-map"

[[guard]]
id = "information-compression"
protects = "design drafts must integrate duplicate concepts, repeated claims, and redundant modules into one clear object-flow model"
proof_surface = "information-compression-pass plus information-architecture-map plus workflow-model"

[[guard]]
id = "surface-composition"
protects = "advanced design drafts must avoid wireframe-like stacks of outlined boxes by using surface, density, hierarchy, material, and state treatment deliberately"
proof_surface = "surface-composition-pass plus visual-decomposition plus design-spec-ledger"

[[guard]]
id = "density-and-signal"
protects = "layouts must not use oversized padding, low-density cards, or decorative whitespace to fake polish while reducing useful signal"
proof_surface = "density-budget plus micro-parity-checklist plus full-page-structural-parity-ledger"

[[guard]]
id = "copy-icon-economy"
protects = "design drafts must reduce explanatory copy and visual noise by using icons, status, counts, grouping, and labels with clear semantic ownership"
proof_surface = "copy-icon-budget plus control-surface-map plus micro-parity-checklist"

[[guard]]
id = "motion-frame-stability"
protects = "spatial manipulation must be stable during motion, not only after mouseup"
proof_surface = "canvas-stability-report with before, mid-drag, and after-drag evidence"

[[guard]]
id = "spatial-label-legibility"
protects = "graph, map, timeline, and spatial labels must not overlap, collide, clip, or become unreadable in screenshots"
proof_surface = "screenshots plus visual-bug-ledger plus full-page-structural-parity-ledger"

[[guard]]
id = "visual-parity-is-not-automation"
protects = "automated checks must not substitute for visual bug and parity review"
proof_surface = "screenshots plus visual-bug-ledger and visual-parity-ledger"

[[guard]]
id = "screenshot-review-integrity"
protects = "visual-bug-ledger must include screenshot-review findings instead of treating clean automation as zero visual bugs"
proof_surface = "visual-bug-ledger plus screenshots plus judge-aggregation"

[[guard]]
id = "reviewer-screenshot-override"
protects = "executor, parent, or judge screenshot review with named visible blockers must override self-reported strict passes"
proof_surface = "visual-bug-ledger plus judge-aggregation plus full-page screenshots"

[[guard]]
id = "ambition-bar"
protects = "high-craft requests must not stop at clean but generic output"
proof_surface = "ambition-bar plus judge-aggregation"

[[guard]]
id = "design-spec-fidelity"
protects = "micro details must be derived from concrete tokens and geometry, not ad hoc guesses"
proof_surface = "design-spec-ledger plus micro-parity-checklist"

[[guard]]
id = "material-asset-parity"
protects = "high-craft material references must not be flattened into CSS-only approximations when reusable generated or provided assets are needed"
proof_surface = "asset-requirement-pass plus asset-generation-ledger plus material-parity-checklist"

[[guard]]
id = "asset-pipeline-integrity"
protects = "generated assets must have explicit role, format, crop, alpha/mask, slice, responsive, selector, and fallback semantics before they can clear material parity"
proof_surface = "asset-generation-ledger plus material-parity-checklist"

[[guard]]
id = "reference-specific-sprite-retention"
protects = "accepted custom glyph and icon sprite assets must not regress into generic icons, font symbols, or visibly rescaled sheet crops"
proof_surface = "asset-generation-ledger plus material-parity-checklist plus micro-parity-checklist"

[[guard]]
id = "nine-slice-renderer-integrity"
protects = "scalable panel, card, inspector, and frame assets must use an explicit nine-slice renderer strategy instead of a stretched full bitmap"
proof_surface = "asset-generation-ledger plus frame-specimen-sheet plus material-parity-checklist"

[[guard]]
id = "frame-specimen-readability"
protects = "frame specimen screenshots must prove readable foreground content, helper text, and focus treatment on rendered material, not only specimen existence"
proof_surface = "frame-specimen-sheet plus material-parity-checklist plus screenshot review"

[[guard]]
id = "alpha-mask-integrity"
protects = "transparent edges, torn masks, glows, and cutouts must not be accepted from RGB crops that create halos, seams, or dirty borders"
proof_surface = "asset-generation-ledger crop manifest plus material-parity-checklist screenshots"

[[guard]]
id = "responsive-asset-parity"
protects = "asset-backed material and artwork must preserve fidelity and not clip or obscure controls across desktop and mobile states"
proof_surface = "state-reference-set plus material-parity-checklist plus desktop and mobile screenshots"

[[guard]]
id = "mobile-spatial-adaptation"
protects = "dense board, graph, pin-wall, map, and timeline surfaces must use an intentional mobile adaptation rather than a shrunken unreadable desktop layout"
proof_surface = "state-reference-set plus full-page-structural-parity-ledger plus mobile screenshots"

[[guard]]
id = "implementation-checkpoint"
protects = "long design-reference or asset-heavy runs must not stall after setup without a working URL, screenshots, blocker count, and next action"
proof_surface = "implementation checkpoint plus handoff or visual-bug-ledger"

[[guard]]
id = "full-page-structural-parity"
protects = "whole-page structure must match exact or generated references before local crop parity claims"
proof_surface = "full-page-structural-parity-ledger"

[[guard]]
id = "control-surface-clarity"
protects = "duplicate or mirrored controls must have clear scope, shared state, and workflow value"
proof_surface = "control-surface-map plus workflow-model"

[[guard]]
id = "primary-action-ownership-parity"
protects = "reference-visible primary actions must not move owner region or scope without recorded delta"
proof_surface = "full-page-structural-parity-ledger plus control-surface-map"

[[guard]]
id = "mvp-complexity"
protects = "skill experiments must be hard enough to falsify high-craft product capability claims"
proof_surface = "mvp-experiment-plan"

