version = 1
insert_target = "bagakit_footer"
summary_line = "- WebpageDesign: Brief=<design brief ref or none>; ReferenceIntent=<exact|style_reference|asset|content_context|data_context|none>; VisualDecomposition=<visual decomposition ref or none>; StateReferences=<state-reference-set ref or none>; ReferenceDrift=<passed|failed|not_applicable>; InformationArchitecture=<information-architecture-map ref or none>; Workflow=<workflow-model ref or none>; ControlSurface=<control-surface-map ref or none>; Interaction=<interaction model ref or none>; CapabilityRoute=<stack/library route ref or none>; MVPExperiment=<mvp-experiment-plan ref or not_applicable>; Affordances=<affordance-inventory ref or none>; BehaviorMatrix=<behavior-matrix ref or none>; VisualBugs=<visual-bug-ledger ref and blocker count or none>; CanvasStability=<canvas-stability-report ref or not_applicable>; VisualJudges=<visual-judge-scorecards ref or not_needed>; JudgeAggregation=<pass|needs_iteration|blocked|not_needed and ref>; Image2=<generated|not_needed_stronger_reference|blocked_unavailable|none>; Reference=<design reference ref or none>; Stack=<host/static/react-vite/other>; Screenshots=<desktop/mobile/state refs or none>; InteractionParity=<interaction-parity-ledger ref or none>; Behavior=<passed|partial|not_applicable>; CodeQuality=<code-quality-review ref or none>; Parity=<match|acceptable_delta|needs_iteration>; Next=<one deterministic next action>"

