when = "bagakit-codex-webpage-design materially shaped visual direction, image prompt, implementation, or visual parity validation"
instruction = "cite the design brief, reference intent, visual decomposition, state reference set, reference-drift check, information architecture map, workflow model, control surface map, interaction model, capability route, MVP experiment plan when applicable, affordance inventory, behavior matrix, visual bug ledger, canvas stability report when applicable, visual judge scorecards and aggregation when applicable, image2 status, image prompt or provided reference, implementation route, browser screenshot and state evidence, behavior interaction evidence, interaction parity, code quality review, side-by-side parity status, accepted trade-offs, and next action"
