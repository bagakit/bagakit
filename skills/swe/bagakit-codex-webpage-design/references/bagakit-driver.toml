version = 1
insert_target = "bagakit_footer"
summary_line = "- WebpageDesign: Brief=<design brief ref or none>; ReferenceIntent=<exact|style_reference|asset|content_context|data_context|none>; VisualDecomposition=<visual decomposition ref or none>; DesignSpec=<design-spec-ledger ref or none>; StateReferences=<state-reference-set ref or none>; ReferenceDrift=<passed|failed|not_applicable>; InformationArchitecture=<information-architecture-map ref or none>; Workflow=<workflow-model ref or none>; ControlSurface=<control-surface-map ref or none>; Interaction=<interaction model ref or none>; CapabilityRoute=<stack/library route ref or none>; MVPExperiment=<mvp-experiment-plan ref or not_applicable>; AssetPipeline=<asset-generation-ledger/material-parity ref or not_needed>; Affordances=<affordance-inventory ref or none>; BehaviorMatrix=<behavior-matrix ref or none>; VisualBugs=<visual-bug-ledger ref and blocker count or none>; StructuralParity=<full-page-structural-parity-ledger ref and high-mismatch count or none>; MicroParity=<micro-parity-checklist ref and high-mismatch count or none>; CanvasStability=<canvas-stability-report ref or not_applicable>; VisualJudges=<visual-judge-scorecards ref or not_needed>; JudgeAggregation=<pass|needs_iteration|blocked|not_needed and ref>; Image2=<generated|not_needed_stronger_reference|blocked_unavailable|none>; Reference=<design reference ref or none>; Stack=<host/static/react-vite/other>; Screenshots=<desktop/mobile/state refs or none>; InteractionParity=<interaction-parity-ledger ref or none>; Behavior=<passed|partial|not_applicable>; CodeQuality=<code-quality-review ref or none>; Parity=<match|acceptable_delta|needs_iteration>; Next=<one deterministic next action>"

[[directive]]
id = "WEBPAGE_DESIGN"
when = "bagakit-codex-webpage-design materially shaped visual direction, image prompt, implementation, or visual parity validation"
instruction = "cite the design brief, reference intent, visual decomposition, design spec ledger, state reference set, reference-drift check, information architecture map, workflow model, control surface map, interaction model, capability route, MVP experiment plan when applicable, asset pipeline evidence when assets are required, affordance inventory, behavior matrix, visual bug ledger, full-page structural parity ledger, micro-parity checklist, canvas stability report when applicable, visual judge scorecards and aggregation when applicable, image2 status, image prompt or provided reference, implementation route, browser screenshot and state evidence, behavior interaction evidence, interaction parity, code quality review, side-by-side parity status, accepted trade-offs, and next action"
