version = 1
skill = "bagakit-spark"
cli_id = "bagakit-spark"
entrypoint = "scripts/bagakit-spark-cli.sh"
runner = "shell"
usage = "sh scripts/bagakit-spark-cli.sh <command>"
summary = "Inspect and validate the Spark discussion workflow skill."
surface_refs = [
  ".bagakit/spark",
]

[[command]]
name = "describe"
summary = "Print a short skill description."

[[command]]
name = "list-references"
summary = "List reference files shipped by this skill."

[[command]]
name = "validate"
summary = "Check that required skill files exist."

[[command]]
name = "print-review-packet-template"
summary = "Print the Spark review packet template."
