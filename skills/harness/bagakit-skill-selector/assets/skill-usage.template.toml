schema_version = "1.0"
# task_id must already be a stable lowercase token: letters, digits, hyphens
task_id = ""
objective = ""
owner = ""
created_at = ""
updated_at = ""
status = "planning"

[preflight]
question = "Do we have enough skill coverage for this task?"
answer = "pending"
gap_summary = ""
decision = "pending"

[evaluation]
quality_score = 0.0
evidence_score = 0.0
feedback_score = 0.0
overall = "pending"
summary = ""

[next_actions]
needs_feedback_confirmation = false
needs_new_search = false
next_search_query = ""
notes = ""

[attempt_policy]
retry_backoff_threshold = 3

[evolver_handoff_policy]
enabled = true

# Append records below with [[recipe_log]], [[skill_plan]], [[usage_log]],
# [[feedback_log]], [[search_log]], [[benchmark_log]], [[error_pattern_log]],
# and [[evolver_signal_log]].
#
# Historical note:
# - [[skill_plan]] and skill_id remain the field names
# - in composed mode, one skill_id may point to a runtime skill id, an external
#   tool id, or another stable reference id when no runtime skill id exists
#
# Optional availability fields on [[skill_plan]]:
# - availability = "available" | "unknown" | "unavailable"
# - availability_detail = "<how availability was checked or why it is blocked>"
#
# Optional recipe fields:
# - recipe_id = "<selector recipe id>"
# - source = "skills/harness/bagakit-skill-selector/recipes/<recipe>.md"
# - status = "considered" | "selected" | "used" | "skipped" | "rejected"
# - synthesis_artifact = "<downstream artifact produced by the recipe>"
#
# Optional composition fields on [[skill_plan]]:
# - composition_role = "standalone" | "composition_entrypoint" | "composition_peer"
# - composition_id = "<task-local-composition-id>"
# - activation_mode = "standalone" | "composed"
# - fallback_strategy = "none" | "standalone_first"
#
# Optional error pattern fields:
# - error_type = "<stable error cluster token>"
# - message_pattern = "<repeat failure text pattern>"
# - occurrence_index = <selector-counted repeat number for the same cluster>
#
# Optional evolver review signal fields:
# - updated_at = "<last local lifecycle update>"
# - signal_id = "<task-local stable signal id>"
# - trigger = "retry_backoff" | "error_pattern" | "failed_benchmark" | "negative_feedback" | "manual_review"
# - scope_hint = "unset" | "host" | "upstream" | "split"
# - status = "suggested" | "exported" | "imported" | "dismissed"
# - evidence_ref = "<task-local evidence artifact>"
#
# Typed preflight decisions:
# - "direct_execute" | "compare_then_execute" | "compose_then_execute" | "review_loop" | "pending"
