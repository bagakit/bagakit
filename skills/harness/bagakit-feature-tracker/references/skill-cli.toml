version = 1
skill = "bagakit-feature-tracker"
cli_id = "bagakit-feature-tracker"
entrypoint = "scripts/feature-tracker.sh"
runner = "shell"
usage = "sh scripts/feature-tracker.sh <command> [args...]"
summary = "Manage feature planning truth, tasks, and closeout lifecycle."
surface_refs = [
  ".bagakit/feature-tracker",
]

[[command]]
name = "initialize-tracker"
summary = "Apply tracker files into a project."

[[command]]
name = "create-feature"
summary = "Create a feature with explicit workspace mode."

[[command]]
name = "create-feature-from-planning-entry-handoff"
summary = "Create a feature from a planning-entry handoff."

[[command]]
name = "assign-feature-workspace"
summary = "Assign or change one feature workspace mode."

[[command]]
name = "show-feature-status"
summary = "Show one feature's status."

[[command]]
name = "start-task"
summary = "Start one feature task."

[[command]]
name = "run-task-gate"
summary = "Record or run one task gate."

[[command]]
name = "prepare-task-commit"
summary = "Prepare task commit evidence."

[[command]]
name = "finish-task"
summary = "Finish one task with gate evidence."

[[command]]
name = "closeout-feature"
summary = "Close out one feature lifecycle."

[[command]]
name = "archive-feature"
summary = "Archive a completed feature."

[[command]]
name = "discard-feature"
summary = "Discard a feature with rationale."

[[command]]
name = "validate-tracker"
summary = "Validate tracker consistency."

[[command]]
name = "diagnose-tracker"
summary = "Run tracker diagnostics."

[[command]]
name = "replan-features"
summary = "Replan feature ordering and dependencies."

[[command]]
name = "show-feature-dag"
summary = "Show feature dependency graph."

[[command]]
name = "list-features"
summary = "List tracked features."

[[command]]
name = "get-feature"
summary = "Show one feature record."

[[command]]
name = "filter-features"
summary = "Filter tracked features."
